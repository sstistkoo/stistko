<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Skica – CAD pro CNC soustružník (X,Z)</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #1e1e2e;
        color: #cdd6f4;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Horní panel ── */
      #topbar {
        display: flex;
        align-items: center;
        background: #181825;
        border-bottom: 1px solid #313244;
        padding: 4px 10px;
        gap: 6px;
        flex-shrink: 0;
        flex-wrap: wrap;
      }
      #topbar .sep {
        width: 1px;
        height: 24px;
        background: #45475a;
        margin: 0 4px;
      }
      .tool-btn {
        background: #313244;
        border: 1px solid #45475a;
        color: #cdd6f4;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 4px;
        transition: 0.15s;
      }
      .tool-btn:hover {
        background: #45475a;
      }
      .tool-btn.active {
        background: #89b4fa;
        color: #1e1e2e;
        border-color: #89b4fa;
      }
      .tool-btn.disabled {
        opacity: 0.4;
        pointer-events: none;
      }
      .tool-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }
      #coordDisplay {
        margin-left: auto;
        font-family: "Consolas", monospace;
        font-size: 13px;
        color: #a6adc8;
        padding: 4px 10px;
        background: #11111b;
        border-radius: 4px;
        min-width: 260px;
      }

      /* ── Hlavní oblast ── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ── Canvas ── */
      #canvasWrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        cursor: crosshair;
      }
      #canvasWrap canvas {
        position: absolute;
        top: 0;
        left: 0;
        touch-action: none;
      }

      /* ── Boční panel ── */
      #sidebar {
        width: 300px;
        background: #181825;
        border-left: 1px solid #313244;
        overflow-y: auto;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }
      .panel-header {
        background: #313244;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #a6adc8;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }
      .panel-header:hover {
        background: #45475a;
      }
      .panel-body {
        padding: 8px 10px;
        font-size: 13px;
      }
      .panel-body table {
        width: 100%;
        border-collapse: collapse;
      }
      .panel-body td {
        padding: 2px 4px;
        vertical-align: top;
      }
      .panel-body td:first-child {
        color: #a6adc8;
        white-space: nowrap;
        width: 50%;
      }
      .panel-body td:last-child {
        color: #f5c2e7;
        font-family: "Consolas", monospace;
      }
      .prop-input {
        width: 100%;
        background: #1e1e2e;
        color: #f5c2e7;
        border: 1px solid #45475a;
        border-radius: 3px;
        padding: 2px 4px;
        font-family: "Consolas", monospace;
        font-size: 12px;
        box-sizing: border-box;
      }
      .prop-input:focus {
        border-color: #89b4fa;
        outline: none;
      }
      .prop-input:hover {
        border-color: #585b70;
      }
      .prop-readonly {
        color: #6c7086;
        font-style: italic;
      }
      .prop-name-input {
        width: 100%;
        background: #1e1e2e;
        color: #cdd6f4;
        border: 1px solid #45475a;
        border-radius: 3px;
        padding: 2px 4px;
        font-size: 12px;
        box-sizing: border-box;
      }
      .prop-name-input:focus {
        border-color: #89b4fa;
        outline: none;
      }
      #objectList {
        list-style: none;
        max-height: 200px;
        overflow-y: auto;
      }
      #objectList li {
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 3px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #objectList li:hover {
        background: #313244;
      }
      #objectList li.selected {
        background: #89b4fa22;
        color: #89b4fa;
      }
      #objectList li .del-btn {
        background: none;
        border: none;
        color: #f38ba8;
        cursor: pointer;
        font-size: 14px;
        padding: 0 4px;
        opacity: 0.6;
      }
      #objectList li .del-btn:hover {
        opacity: 1;
      }
      #objectList li .obj-icon {
        font-size: 10px;
        margin-right: 4px;
        opacity: 0.6;
      }

      #intersectionList {
        list-style: none;
        max-height: 250px;
        overflow-y: auto;
      }
      #intersectionList li {
        padding: 3px 8px;
        font-size: 12px;
        font-family: "Consolas", monospace;
        color: #a6e3a1;
        border-bottom: 1px solid #31324444;
        cursor: pointer;
        transition: background 0.15s;
      }
      #intersectionList li:hover {
        background: #313244;
      }
      #intersectionList li .copy-hint {
        font-size: 10px;
        color: #6c7086;
        float: right;
      }

      /* ── Input dialog ── */
      .input-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .input-dialog {
        background: #1e1e2e;
        border: 1px solid #45475a;
        border-radius: 8px;
        padding: 20px;
        min-width: 320px;
        max-width: 480px;
      }
      .input-dialog h3 {
        margin-bottom: 12px;
        color: #89b4fa;
        font-size: 15px;
      }
      .input-dialog label {
        display: block;
        font-size: 13px;
        margin-bottom: 4px;
        color: #a6adc8;
      }
      .input-dialog input,
      .input-dialog select {
        width: 100%;
        padding: 6px 8px;
        background: #313244;
        border: 1px solid #45475a;
        color: #cdd6f4;
        border-radius: 4px;
        font-size: 13px;
        margin-bottom: 10px;
        font-family: "Consolas", monospace;
      }
      .input-dialog .input-row {
        display: flex;
        gap: 8px;
      }
      .input-dialog .input-row > div {
        flex: 1;
      }
      .input-dialog .btn-row {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 8px;
      }
      .input-dialog button {
        padding: 6px 16px;
        border-radius: 4px;
        border: 1px solid #45475a;
        cursor: pointer;
        font-size: 13px;
      }
      .input-dialog .btn-ok {
        background: #89b4fa;
        color: #1e1e2e;
        border-color: #89b4fa;
      }
      .input-dialog .btn-cancel {
        background: #313244;
        color: #cdd6f4;
      }

      /* ── Statusbar ── */
      #statusbar {
        background: #181825;
        border-top: 1px solid #313244;
        padding: 3px 10px;
        font-size: 12px;
        color: #a6adc8;
        display: flex;
        gap: 20px;
        flex-shrink: 0;
      }

      /* Snap indicator */
      .snap-ind {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .snap-on {
        background: #a6e3a1;
      }
      .snap-off {
        background: #f38ba8;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        background: #313244;
        color: #a6e3a1;
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 13px;
        z-index: 999;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        border: 1px solid #45475a;
      }
      .toast.show {
        opacity: 1;
      }

      /* Dimension labels */
      .dim-label {
        font: 10px Consolas;
        fill: #9399b2;
      }

      /* ── Mobile toolbar toggle ── */
      #mobileToolbarToggle {
        display: none;
        position: fixed;
        bottom: 8px;
        left: 8px;
        z-index: 60;
        background: #89b4fa;
        color: #1e1e2e;
        border: none;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      #mobileSidebarToggle {
        display: none;
        position: fixed;
        bottom: 8px;
        right: 8px;
        z-index: 60;
        background: #a6e3a1;
        color: #1e1e2e;
        border: none;
        border-radius: 50%;
        width: 48px;
        height: 48px;
        font-size: 22px;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      }
      #mobileCoordBar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        background: #11111bdd;
        color: #a6adc8;
        font-family: "Consolas", monospace;
        font-size: 12px;
        padding: 4px 10px;
        text-align: center;
        -webkit-backdrop-filter: blur(4px);
        backdrop-filter: blur(4px);
      }

      /* ── Mobile responsive ── */
      @media (max-width: 900px) {
        #topbar {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          top: auto;
          z-index: 55;
          border-bottom: none;
          border-top: 1px solid #313244;
          padding: 6px;
          gap: 4px;
          max-height: 60vh;
          overflow-y: auto;
          transform: translateY(100%);
          transition: transform 0.25s ease;
        }
        #topbar.mobile-open {
          transform: translateY(0);
        }
        .tool-btn {
          padding: 10px 12px;
          font-size: 14px;
          min-height: 40px;
        }
        .tool-btn svg {
          width: 20px;
          height: 20px;
        }
        #topbar .sep {
          width: 100%;
          height: 1px;
          margin: 2px 0;
        }
        #coordDisplay {
          display: none;
        }
        #mobileToolbarToggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        #mobileSidebarToggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }
        #mobileCoordBar {
          display: block;
        }

        #sidebar {
          position: fixed;
          top: 0;
          right: 0;
          bottom: 0;
          width: 85vw;
          max-width: 340px;
          z-index: 65;
          transform: translateX(100%);
          transition: transform 0.25s ease;
          box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
        }
        #sidebar.mobile-open {
          transform: translateX(0);
        }
        #sidebarOverlay {
          display: none;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background: rgba(0, 0, 0, 0.4);
          z-index: 64;
        }
        #sidebarOverlay.active {
          display: block;
        }

        #main {
          flex-direction: column;
        }
        #canvasWrap {
          width: 100%;
          height: 100%;
        }
        #statusbar {
          display: none;
        }

        /* Dialog na mobilu */
        .input-dialog {
          min-width: auto !important;
          width: 92vw;
          max-width: 460px;
          max-height: 85vh;
          overflow-y: auto;
          padding: 16px;
        }
        .input-dialog input,
        .input-dialog select {
          padding: 10px 8px;
          font-size: 16px;
        }
        .input-dialog button {
          padding: 10px 18px;
          font-size: 14px;
          min-height: 40px;
        }
        .input-dialog .input-row {
          flex-direction: column;
          gap: 4px;
        }
      }

      @media (max-width: 500px) {
        .tool-btn {
          font-size: 13px;
          padding: 8px 10px;
          flex: 1 1 auto;
          justify-content: center;
          min-width: 0;
        }
        #topbar {
          flex-wrap: wrap;
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Mobile Controls ── -->
    <button id="mobileToolbarToggle" aria-label="Nástroje">🔧</button>
    <button id="mobileSidebarToggle" aria-label="Panel">☰</button>
    <div id="mobileCoordBar">X: 0.000 &nbsp; Z: 0.000</div>
    <div id="sidebarOverlay"></div>

    <!-- ── Toolbar ── -->
    <div id="topbar">
      <button class="tool-btn" id="btnUndo" title="Zpět (Ctrl+Z)" disabled>
        ↩ Zpět
      </button>
      <button class="tool-btn" id="btnRedo" title="Vpřed (Ctrl+Y)" disabled>
        ↪ Vpřed
      </button>
      <div class="sep"></div>
      <button class="tool-btn active" data-tool="select" title="Výběr (V)">
        <svg viewBox="0 0 24 24">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51z" />
        </svg>
        Výběr
      </button>
      <button class="tool-btn" data-tool="move" title="Přesun (W)">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2l3 3h-2v5h5v-2l3 3-3 3v-2h-5v5h2l-3 3-3-3h2v-5H5v2L2 12l3-3v2h5V6H8z"
            fill="currentColor"
          />
        </svg>
        Přesun
      </button>
      <button class="tool-btn" data-tool="point" title="Bod (P)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" /></svg> Bod
      </button>
      <button class="tool-btn" data-tool="line" title="Úsečka (L)">
        <svg viewBox="0 0 24 24">
          <line
            x1="4"
            y1="20"
            x2="20"
            y2="4"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Úsečka
      </button>
      <button class="tool-btn" data-tool="constr" title="Konstrukční čára (K)">
        <svg viewBox="0 0 24 24">
          <line
            x1="2"
            y1="22"
            x2="22"
            y2="2"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
        </svg>
        Konstr.
      </button>
      <button class="tool-btn" data-tool="circle" title="Kružnice (C)">
        <svg viewBox="0 0 24 24">
          <circle
            cx="12"
            cy="12"
            r="9"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Kružnice
      </button>
      <button class="tool-btn" data-tool="arc" title="Oblouk (A)">
        <svg viewBox="0 0 24 24">
          <path
            d="M4 20 A 12 12 0 0 1 20 4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Oblouk
      </button>
      <button class="tool-btn" data-tool="rect" title="Obdélník (R)">
        <svg viewBox="0 0 24 24">
          <rect
            x="3"
            y="5"
            width="18"
            height="14"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Obdélník
      </button>
      <div class="sep"></div>
      <button class="tool-btn" data-tool="measure" title="Měření (M)">
        <svg viewBox="0 0 24 24">
          <path
            d="M3 21L21 3M8 21V16M13 21V13M18 21V10"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
        </svg>
        Měření
      </button>
      <div class="sep"></div>
      <button class="tool-btn" id="btnSnap" title="Přichytávání k mřížce (G)">
        <span class="snap-ind snap-on"></span>Snap
      </button>
      <button class="tool-btn" id="btnDims" title="Zobrazit kóty (D)">
        📐 Kóty
      </button>
      <button class="tool-btn" id="btnNumInput" title="Číselný vstup (N)">
        🔢 Zadat
      </button>
      <button
        class="tool-btn"
        id="btnPolar"
        title="Polární kreslení z bodu (Shift+N)"
      >
        📐 Polární
      </button>
      <button class="tool-btn" id="btnCalcInt" title="Vypočítat průsečíky">
        ⊗ Průsečíky
      </button>
      <div class="sep"></div>
      <button class="tool-btn" id="btnSave" title="Uložit projekt (Ctrl+S)">
        💾 Uložit
      </button>
      <button class="tool-btn" id="btnLoad" title="Načíst projekt">
        📂 Načíst
      </button>
      <button class="tool-btn" id="btnClearAll" title="Smazat vše">
        🗑 Smazat
      </button>
      <button class="tool-btn" id="btnExport" title="Export CNC souřadnic">
        📋 CNC Export
      </button>
      <div id="coordDisplay">X: 0.000 &nbsp; Z: 0.000</div>
    </div>

    <!-- ── Main ── -->
    <div id="main">
      <div id="canvasWrap">
        <canvas id="gridCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
      </div>
      <div id="sidebar">
        <div class="panel-header" onclick="togglePanel('objPanel')">
          ▾ Objekty
        </div>
        <div class="panel-body" id="objPanel">
          <ul id="objectList"></ul>
        </div>
        <div class="panel-header" onclick="togglePanel('propPanel')">
          ▾ Vlastnosti
        </div>
        <div class="panel-body" id="propPanel">
          <table id="propTable">
            <tbody></tbody>
          </table>
        </div>
        <div class="panel-header" onclick="togglePanel('intPanel')">
          ▾ Průsečíky
        </div>
        <div class="panel-body" id="intPanel">
          <ul id="intersectionList">
            <li style="color: #6c7086">Klikněte ⊗ Průsečíky</li>
          </ul>
        </div>
        <div class="panel-header" onclick="togglePanel('cncPanel')">
          ▾ CNC Souřadnice
        </div>
        <div class="panel-body" id="cncPanel">
          <pre
            id="cncOutput"
            style="
              font-size: 11px;
              color: #f9e2af;
              white-space: pre-wrap;
              max-height: 200px;
              overflow-y: auto;
            "
          >
Klikněte 📋 CNC Export</pre
          >
        </div>
      </div>
    </div>

    <!-- ── Statusbar ── -->
    <div id="statusbar">
      <span id="statusTool">Nástroj: Výběr</span>
      <span id="statusHint">Klikněte pro výběr objektu</span>
      <span id="statusZoom">Zoom: 100%</span>
      <span
        id="statusGrid"
        title="Klikněte pro změnu velikosti mřížky"
        style="cursor: pointer"
        >Mřížka: 10</span
      >
      <span>Posun: Prostřední tlačítko / Shift+táhnutí</span>
    </div>

    <script>
      // ╔══════════════════════════════════════════════════════════════╗
      // ║      SKICA – Jednoduchý CAD pro CNC soustružník v3     ║
      // ╚══════════════════════════════════════════════════════════════╝

      // ── Toast notifikace ──
      function showToast(msg, duration = 2000) {
        let t = document.querySelector(".toast");
        if (!t) {
          t = document.createElement("div");
          t.className = "toast";
          document.body.appendChild(t);
        }
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), duration);
      }

      // ── Stav aplikace ──
      const state = {
        objects: [],
        selected: null,
        tool: "select",
        snapToGrid: true,
        snapToPoints: true,
        gridSize: 10,
        zoom: 1,
        panX: 0,
        panY: 0,
        drawing: false,
        tempPoints: [],
        mouse: {
          x: 0,
          y: 0,
          rawX: 0,
          rawY: 0,
          sx: 0,
          sy: 0,
          snapped: false,
          snapType: "",
        },
        intersections: [],
        nextId: 1,
        showDimensions: true,
        // Undo/Redo
        undoStack: [],
        redoStack: [],
        maxUndo: 50,
        // Move
        dragging: false,
        dragObjIdx: null,
        dragStartWorld: null,
        dragObjSnapshot: null,
      };

      // ── Undo / Redo ──
      function pushUndo() {
        state.undoStack.push(JSON.stringify(state.objects));
        if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
        state.redoStack = [];
        updateUndoButtons();
      }
      function undo() {
        if (state.undoStack.length === 0) return;
        state.redoStack.push(JSON.stringify(state.objects));
        state.objects = JSON.parse(state.undoStack.pop());
        state.selected = null;
        state.intersections = [];
        updateObjectList();
        updateProperties();
        updateIntersectionList();
        renderAll();
        updateUndoButtons();
        showToast("Zpět");
      }
      function redo() {
        if (state.redoStack.length === 0) return;
        state.undoStack.push(JSON.stringify(state.objects));
        state.objects = JSON.parse(state.redoStack.pop());
        state.selected = null;
        state.intersections = [];
        updateObjectList();
        updateProperties();
        updateIntersectionList();
        renderAll();
        updateUndoButtons();
        showToast("Vpřed");
      }
      function updateUndoButtons() {
        document.getElementById("btnUndo").disabled =
          state.undoStack.length === 0;
        document.getElementById("btnRedo").disabled =
          state.redoStack.length === 0;
        document
          .getElementById("btnUndo")
          .classList.toggle("disabled", state.undoStack.length === 0);
        document
          .getElementById("btnRedo")
          .classList.toggle("disabled", state.redoStack.length === 0);
      }

      // ── Canvas setup ──
      const wrap = document.getElementById("canvasWrap");
      const gridCanvas = document.getElementById("gridCanvas");
      const drawCanvas = document.getElementById("drawCanvas");
      const gridCtx = gridCanvas.getContext("2d");
      const ctx = drawCanvas.getContext("2d");

      function resizeCanvases() {
        const w = wrap.clientWidth,
          h = wrap.clientHeight;
        [gridCanvas, drawCanvas].forEach((c) => {
          c.width = w;
          c.height = h;
        });
        if (state.panX === 0 && state.panY === 0) {
          state.panX = w / 2;
          state.panY = h / 2;
        }
        renderAll();
      }
      window.addEventListener("resize", resizeCanvases);

      // ── Souřadnicové transformace ──
      function worldToScreen(wx, wy) {
        return [wx * state.zoom + state.panX, -wy * state.zoom + state.panY];
      }
      function screenToWorld(sx, sy) {
        return [
          (sx - state.panX) / state.zoom,
          -(sy - state.panY) / state.zoom,
        ];
      }
      function snap(val) {
        if (!state.snapToGrid) return val;
        return Math.round(val / state.gridSize) * state.gridSize;
      }
      function snapPt(wx, wy) {
        // Snap k bodům objektů (koncové body, středy)
        if (state.snapToPoints) {
          const threshold = 8 / state.zoom;
          let bestD = threshold,
            bestX = null,
            bestY = null;
          for (const obj of state.objects) {
            const pts = getObjectSnapPoints(obj);
            for (const p of pts) {
              const d = Math.hypot(p.x - wx, p.y - wy);
              if (d < bestD) {
                bestD = d;
                bestX = p.x;
                bestY = p.y;
              }
            }
          }
          // Snap k průsečíkům
          for (const pt of state.intersections) {
            const d = Math.hypot(pt.x - wx, pt.y - wy);
            if (d < bestD) {
              bestD = d;
              bestX = pt.x;
              bestY = pt.y;
            }
          }
          if (bestX !== null) {
            state.mouse.snapped = true;
            state.mouse.snapType = "point";
            return [bestX, bestY];
          }
        }
        if (state.snapToGrid) {
          state.mouse.snapped = true;
          state.mouse.snapType = "grid";
          return [snap(wx), snap(wy)];
        }
        state.mouse.snapped = false;
        state.mouse.snapType = "";
        return [wx, wy];
      }

      function getObjectSnapPoints(obj) {
        switch (obj.type) {
          case "point":
            return [{ x: obj.x, y: obj.y }];
          case "line":
          case "constr":
            return [
              { x: obj.x1, y: obj.y1 },
              { x: obj.x2, y: obj.y2 },
              { x: (obj.x1 + obj.x2) / 2, y: (obj.y1 + obj.y2) / 2 },
            ];
          case "circle":
            return [
              { x: obj.cx, y: obj.cy },
              { x: obj.cx + obj.r, y: obj.cy },
              { x: obj.cx - obj.r, y: obj.cy },
              { x: obj.cx, y: obj.cy + obj.r },
              { x: obj.cx, y: obj.cy - obj.r },
            ];
          case "arc":
            return [
              { x: obj.cx, y: obj.cy },
              {
                x: obj.cx + obj.r * Math.cos(obj.startAngle),
                y: obj.cy + obj.r * Math.sin(obj.startAngle),
              },
              {
                x: obj.cx + obj.r * Math.cos(obj.endAngle),
                y: obj.cy + obj.r * Math.sin(obj.endAngle),
              },
            ];
          case "rect":
            return [
              { x: obj.x1, y: obj.y1 },
              { x: obj.x2, y: obj.y1 },
              { x: obj.x2, y: obj.y2 },
              { x: obj.x1, y: obj.y2 },
              { x: (obj.x1 + obj.x2) / 2, y: (obj.y1 + obj.y2) / 2 },
            ];
          default:
            return [];
        }
      }

      // ── Renderování ──
      function renderAll() {
        renderGrid();
        renderObjects();
      }

      function renderGrid() {
        const w = gridCanvas.width,
          h = gridCanvas.height;
        const g = gridCtx;
        g.clearRect(0, 0, w, h);
        const step = state.gridSize * state.zoom;
        let drawStep = step,
          drawGridSize = state.gridSize;
        while (drawStep < 15) {
          drawStep *= 2;
          drawGridSize *= 2;
        }

        // Sub-grid
        if (drawStep > 30) {
          g.strokeStyle = "#1a1a2e";
          g.lineWidth = 0.5;
          const subStep = drawStep / 5;
          const startX = state.panX % subStep,
            startY = state.panY % subStep;
          g.beginPath();
          for (let x = startX; x < w; x += subStep) {
            g.moveTo(x, 0);
            g.lineTo(x, h);
          }
          for (let y = startY; y < h; y += subStep) {
            g.moveTo(0, y);
            g.lineTo(w, y);
          }
          g.stroke();
        }

        // Hlavní mřížka
        g.strokeStyle = "#252540";
        g.lineWidth = 0.5;
        const startX = state.panX % drawStep,
          startY = state.panY % drawStep;
        g.beginPath();
        for (let x = startX; x < w; x += drawStep) {
          g.moveTo(x, 0);
          g.lineTo(x, h);
        }
        for (let y = startY; y < h; y += drawStep) {
          g.moveTo(0, y);
          g.lineTo(w, y);
        }
        g.stroke();

        // Osy
        g.lineWidth = 1.5;
        g.strokeStyle = "#f38ba855";
        g.beginPath();
        g.moveTo(0, state.panY);
        g.lineTo(w, state.panY);
        g.stroke();
        g.strokeStyle = "#a6e3a155";
        g.beginPath();
        g.moveTo(state.panX, 0);
        g.lineTo(state.panX, h);
        g.stroke();

        // Popisky os
        g.font = "10px Consolas";
        g.fillStyle = "#6c7086";
        for (let x = startX; x < w; x += drawStep) {
          const [wx] = screenToWorld(x, 0);
          const label = Math.round(wx / drawGridSize) * drawGridSize;
          if (label === 0) continue;
          g.fillText(label.toString(), x + 2, state.panY - 4);
        }
        for (let y = startY; y < h; y += drawStep) {
          const [, wy] = screenToWorld(0, y);
          const label = Math.round(wy / drawGridSize) * drawGridSize;
          if (label === 0) continue;
          g.fillText(label.toString(), state.panX + 4, y - 2);
        }
        g.fillStyle = "#f9e2af";
        g.font = "11px Consolas";
        g.fillText("0", state.panX + 4, state.panY - 4);

        // Popisky os X a Z
        g.font = "bold 13px Consolas";
        g.fillStyle = "#f38ba8";
        g.fillText("X", w - 18, state.panY - 8);
        g.fillStyle = "#a6e3a1";
        g.fillText("Z", state.panX + 8, 16);
      }

      function renderObjects() {
        const w = drawCanvas.width,
          h = drawCanvas.height;
        ctx.clearRect(0, 0, w, h);

        state.objects.forEach((obj, idx) => {
          const isSel = idx === state.selected;
          const isConstr = obj.type === "constr";
          ctx.strokeStyle = isSel
            ? "#f9e2af"
            : isConstr
              ? "#6c7086"
              : obj.color || "#89b4fa";
          ctx.fillStyle = isSel
            ? "#f9e2af"
            : isConstr
              ? "#6c7086"
              : obj.color || "#89b4fa";
          ctx.lineWidth = isSel ? 2.5 : 1.5;
          ctx.setLineDash(isConstr || obj.dashed ? [6, 4] : []);

          switch (obj.type) {
            case "point":
              drawPoint(obj);
              break;
            case "line":
            case "constr":
              drawLine(obj);
              break;
            case "circle":
              drawCircle(obj);
              break;
            case "arc":
              drawArc(obj);
              break;
            case "rect":
              drawRect(obj);
              break;
          }
          ctx.setLineDash([]);

          // Kóty
          if (state.showDimensions && !isConstr) drawDimension(obj);
        });

        // Průsečíky
        state.intersections.forEach((pt) => {
          const [sx, sy] = worldToScreen(pt.x, pt.y);
          ctx.fillStyle = "#a6e3a1";
          ctx.strokeStyle = "#a6e3a1";
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(sx, sy, 5, 0, Math.PI * 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(sx, sy, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.font = "10px Consolas";
          ctx.fillText(
            `X${pt.x.toFixed(2)} Z${pt.y.toFixed(2)}`,
            sx + 8,
            sy - 6,
          );
        });

        // Dočasné kreslení
        if (state.drawing && state.tempPoints.length > 0) {
          ctx.strokeStyle = "#f5c2e7";
          ctx.fillStyle = "#f5c2e7";
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 4]);
          const tp = state.tempPoints;
          const [mx, my] = [state.mouse.x, state.mouse.y];

          if (
            state.tool === "line" ||
            state.tool === "constr" ||
            state.tool === "measure"
          ) {
            const [sx1, sy1] = worldToScreen(tp[0].x, tp[0].y);
            const [sx2, sy2] = worldToScreen(mx, my);
            ctx.beginPath();
            ctx.moveTo(sx1, sy1);
            ctx.lineTo(sx2, sy2);
            ctx.stroke();
            const d = Math.hypot(mx - tp[0].x, my - tp[0].y);
            const angle =
              (Math.atan2(my - tp[0].y, mx - tp[0].x) * 180) / Math.PI;
            ctx.setLineDash([]);
            ctx.font = "12px Consolas";
            ctx.fillText(
              `${d.toFixed(3)} mm  ${angle.toFixed(1)}°`,
              (sx1 + sx2) / 2 + 8,
              (sy1 + sy2) / 2 - 8,
            );
          }
          if (state.tool === "circle") {
            const [sx, sy] = worldToScreen(tp[0].x, tp[0].y);
            const rw = Math.hypot(mx - tp[0].x, my - tp[0].y);
            const r = rw * state.zoom;
            ctx.beginPath();
            ctx.arc(sx, sy, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.font = "12px Consolas";
            ctx.fillText(`R ${rw.toFixed(3)}`, sx + r + 6, sy);
          }
          if (state.tool === "rect") {
            const [sx1, sy1] = worldToScreen(tp[0].x, tp[0].y);
            const [sx2, sy2] = worldToScreen(mx, my);
            ctx.beginPath();
            ctx.rect(
              Math.min(sx1, sx2),
              Math.min(sy1, sy2),
              Math.abs(sx2 - sx1),
              Math.abs(sy2 - sy1),
            );
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.font = "12px Consolas";
            ctx.fillText(
              `${Math.abs(mx - tp[0].x).toFixed(1)} × ${Math.abs(my - tp[0].y).toFixed(1)}`,
              Math.max(sx1, sx2) + 6,
              Math.min(sy1, sy2) - 4,
            );
          }
          if (state.tool === "arc" && tp.length >= 2) {
            const cx = tp[0].x,
              cy = tp[0].y;
            const r = Math.hypot(tp[1].x - cx, tp[1].y - cy);
            const [scx, scy] = worldToScreen(cx, cy);
            const rr = r * state.zoom;
            const startAngle = -Math.atan2(tp[1].y - cy, tp[1].x - cx);
            const endAngle = -Math.atan2(my - cy, mx - cx);
            ctx.beginPath();
            ctx.arc(scx, scy, rr, startAngle, endAngle);
            ctx.stroke();
          }
          ctx.setLineDash([]);
        }

        // Snap indikátor
        drawSnapIndicator();
      }

      // ── Snap indikátor u kurzoru ──
      function drawSnapIndicator() {
        if (!state.mouse.snapped) return;
        const [sx, sy] = worldToScreen(state.mouse.x, state.mouse.y);

        if (state.mouse.snapType === "point") {
          // Snap k bodu – žlutý čtvereček
          ctx.strokeStyle = "#f9e2af";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.rect(sx - 6, sy - 6, 12, 12);
          ctx.stroke();
          ctx.font = "9px Consolas";
          ctx.fillStyle = "#f9e2af";
          ctx.fillText("SNAP", sx + 9, sy - 3);
        } else if (state.mouse.snapType === "grid") {
          // Snap k mřížce – malý křížek
          ctx.strokeStyle = "#585b70";
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(sx - 4, sy);
          ctx.lineTo(sx + 4, sy);
          ctx.moveTo(sx, sy - 4);
          ctx.lineTo(sx, sy + 4);
          ctx.stroke();
        }

        // Vodící čára od raw pozice k snap pozici
        if (state.mouse.rawX !== undefined) {
          const [rawSx, rawSy] = worldToScreen(
            state.mouse.rawX,
            state.mouse.rawY,
          );
          const dist = Math.hypot(rawSx - sx, rawSy - sy);
          if (dist > 3) {
            ctx.strokeStyle = "rgba(137, 180, 250, 0.3)";
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(rawSx, rawSy);
            ctx.lineTo(sx, sy);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      // ── Kóty / rozměry ──
      function drawDimension(obj) {
        ctx.font = "10px Consolas";
        ctx.fillStyle = "#9399b2";
        const offset = 14;
        switch (obj.type) {
          case "line": {
            const [sx1, sy1] = worldToScreen(obj.x1, obj.y1);
            const [sx2, sy2] = worldToScreen(obj.x2, obj.y2);
            const len = Math.hypot(obj.x2 - obj.x1, obj.y2 - obj.y1);
            const mx = (sx1 + sx2) / 2,
              my = (sy1 + sy2) / 2;
            const angle = Math.atan2(sy2 - sy1, sx2 - sx1);
            const nx = -Math.sin(angle) * offset,
              ny = Math.cos(angle) * offset;
            ctx.fillText(len.toFixed(2), mx + nx, my + ny);
            break;
          }
          case "circle": {
            const [sx, sy] = worldToScreen(obj.cx, obj.cy);
            ctx.fillText(`R${obj.r.toFixed(2)}`, sx + 6, sy - 6);
            ctx.fillText(`⌀${(obj.r * 2).toFixed(2)}`, sx + 6, sy + 14);
            break;
          }
          case "arc": {
            const [sx, sy] = worldToScreen(obj.cx, obj.cy);
            ctx.fillText(`R${obj.r.toFixed(2)}`, sx + 6, sy - 6);
            break;
          }
          case "rect": {
            const [sx1, sy1] = worldToScreen(obj.x1, obj.y1);
            const [sx2, sy2] = worldToScreen(obj.x2, obj.y2);
            const w = Math.abs(obj.x2 - obj.x1),
              h = Math.abs(obj.y2 - obj.y1);
            // Šířka nahoře
            ctx.fillText(
              w.toFixed(2),
              (sx1 + sx2) / 2 - 15,
              Math.min(sy1, sy2) - 4,
            );
            // Výška vpravo
            ctx.fillText(
              h.toFixed(2),
              Math.max(sx1, sx2) + 4,
              (sy1 + sy2) / 2 + 4,
            );
            break;
          }
        }
      }

      // ── Kreslicí funkce ──
      function drawPoint(obj) {
        const [sx, sy] = worldToScreen(obj.x, obj.y);
        ctx.beginPath();
        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(sx - 6, sy);
        ctx.lineTo(sx + 6, sy);
        ctx.moveTo(sx, sy - 6);
        ctx.lineTo(sx, sy + 6);
        ctx.stroke();
      }
      function drawLine(obj) {
        const [sx1, sy1] = worldToScreen(obj.x1, obj.y1);
        const [sx2, sy2] = worldToScreen(obj.x2, obj.y2);

        if (obj.type === "constr") {
          // Konstrukční čára – prodloužená přes celý viewport
          const dx = sx2 - sx1,
            dy = sy2 - sy1;
          const len = Math.hypot(dx, dy);
          if (len < 0.1) return;
          const scale = 5000 / len;
          ctx.beginPath();
          ctx.moveTo(sx1 - dx * scale, sy1 - dy * scale);
          ctx.lineTo(sx2 + dx * scale, sy2 + dy * scale);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(sx1, sy1);
          ctx.lineTo(sx2, sy2);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(sx1, sy1, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(sx2, sy2, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      function drawCircle(obj) {
        const [sx, sy] = worldToScreen(obj.cx, obj.cy);
        const r = obj.r * state.zoom;
        ctx.beginPath();
        ctx.arc(sx, sy, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      function drawArc(obj) {
        const [sx, sy] = worldToScreen(obj.cx, obj.cy);
        const r = obj.r * state.zoom;
        ctx.beginPath();
        ctx.arc(sx, sy, r, -obj.endAngle, -obj.startAngle);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(sx, sy, 2, 0, Math.PI * 2);
        ctx.fill();
      }
      function drawRect(obj) {
        const [sx1, sy1] = worldToScreen(obj.x1, obj.y1);
        const [sx2, sy2] = worldToScreen(obj.x2, obj.y2);
        ctx.beginPath();
        ctx.rect(
          Math.min(sx1, sx2),
          Math.min(sy1, sy2),
          Math.abs(sx2 - sx1),
          Math.abs(sy2 - sy1),
        );
        ctx.stroke();
      }

      // ── Přidání objektu ──
      function addObject(obj) {
        pushUndo();
        obj.id = state.nextId++;
        state.objects.push(obj);
        updateObjectList();
        renderAll();
        return obj;
      }

      // ── Přesun objektu ──
      function moveObject(obj, dx, dy) {
        switch (obj.type) {
          case "point":
            obj.x += dx;
            obj.y += dy;
            break;
          case "line":
          case "constr":
            obj.x1 += dx;
            obj.y1 += dy;
            obj.x2 += dx;
            obj.y2 += dy;
            break;
          case "circle":
            obj.cx += dx;
            obj.cy += dy;
            break;
          case "arc":
            obj.cx += dx;
            obj.cy += dy;
            break;
          case "rect":
            obj.x1 += dx;
            obj.y1 += dy;
            obj.x2 += dx;
            obj.y2 += dy;
            break;
        }
      }

      // ── Myš ──
      let isPanning = false;
      let panStartX, panStartY, panStartPX, panStartPY;

      drawCanvas.addEventListener("mousemove", (e) => {
        const rect = drawCanvas.getBoundingClientRect();
        state.mouse.sx = e.clientX - rect.left;
        state.mouse.sy = e.clientY - rect.top;
        let [rawWx, rawWy] = screenToWorld(state.mouse.sx, state.mouse.sy);
        state.mouse.rawX = rawWx;
        state.mouse.rawY = rawWy;
        let [wx, wy] = [rawWx, rawWy];
        if (state.snapToGrid || state.snapToPoints)
          [wx, wy] = snapPt(rawWx, rawWy);
        state.mouse.x = wx;
        state.mouse.y = wy;

        // Polar info z referenčního bodu
        let extra = "";
        if (state.drawing && state.tempPoints.length > 0) {
          const ref = state.tempPoints[state.tempPoints.length - 1];
          const ddx = wx - ref.x,
            ddy = wy - ref.y;
          const dist = Math.hypot(ddx, ddy);
          const ang = (Math.atan2(ddy, ddx) * 180) / Math.PI;
          extra = `   |   d=${dist.toFixed(2)}  ∠=${ang.toFixed(1)}°`;
        }

        document.getElementById("coordDisplay").textContent =
          `X: ${wx.toFixed(3)}   Z: ${wy.toFixed(3)}${extra}`;

        if (isPanning) {
          state.panX = panStartPX + (e.clientX - panStartX);
          state.panY = panStartPY + (e.clientY - panStartY);
        }

        // Přetahování objektu
        if (state.dragging && state.dragObjIdx !== null) {
          const obj = state.objects[state.dragObjIdx];
          const dx = wx - state.dragStartWorld.x;
          const dy = wy - state.dragStartWorld.y;
          // Obnovit snapshot a posunout
          const snapShot = JSON.parse(state.dragObjSnapshot);
          Object.assign(obj, snapShot);
          moveObject(obj, dx, dy);
        }

        renderAll();
      });

      drawCanvas.addEventListener("mousedown", (e) => {
        if (e.button === 1 || (e.button === 0 && e.shiftKey)) {
          isPanning = true;
          panStartX = e.clientX;
          panStartY = e.clientY;
          panStartPX = state.panX;
          panStartPY = state.panY;
          drawCanvas.style.cursor = "grabbing";
          e.preventDefault();
          return;
        }
        if (e.button !== 0) return;

        const wx = state.mouse.x,
          wy = state.mouse.y;

        switch (state.tool) {
          case "select":
            selectObjectAt(wx, wy);
            break;

          case "move":
            if (!state.dragging) {
              // Najít objekt pod kurzorem
              const idx = findObjectAt(wx, wy);
              if (idx !== null) {
                pushUndo();
                state.dragging = true;
                state.dragObjIdx = idx;
                state.dragStartWorld = { x: wx, y: wy };
                state.dragObjSnapshot = JSON.stringify(state.objects[idx]);
                state.selected = idx;
                updateProperties();
                drawCanvas.style.cursor = "move";
                setHint("Táhněte objekt, klikněte pro umístění");
              }
            } else {
              // Umístit
              state.dragging = false;
              state.dragObjIdx = null;
              drawCanvas.style.cursor = "crosshair";
              updateProperties();
              resetHint();
            }
            break;

          case "point":
            addObject({
              type: "point",
              x: wx,
              y: wy,
              name: `Bod ${state.nextId}`,
            });
            break;

          case "line":
          case "constr":
          case "measure":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint(
                "Klikněte na koncový bod" +
                  (state.tool === "constr" ? " konstrukční čáry" : ""),
              );
            } else {
              const tp = state.tempPoints[0];
              if (state.tool === "line" || state.tool === "constr") {
                addObject({
                  type: state.tool === "constr" ? "constr" : "line",
                  x1: tp.x,
                  y1: tp.y,
                  x2: wx,
                  y2: wy,
                  name: `${state.tool === "constr" ? "Konstr" : "Úsečka"} ${state.nextId}`,
                  dashed: state.tool === "constr",
                });
              } else {
                const d = Math.hypot(wx - tp.x, wy - tp.y);
                const angle =
                  (Math.atan2(wy - tp.y, wx - tp.x) * 180) / Math.PI;
                showMeasureResult(tp, { x: wx, y: wy }, d, angle);
              }
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "circle":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klikněte pro poloměr nebo Enter pro číselné zadání");
            } else {
              const cp = state.tempPoints[0];
              const r = Math.hypot(wx - cp.x, wy - cp.y);
              addObject({
                type: "circle",
                cx: cp.x,
                cy: cp.y,
                r,
                name: `Kružnice ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "arc":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klikněte na počáteční bod oblouku");
            } else if (state.tempPoints.length === 1) {
              state.tempPoints.push({ x: wx, y: wy });
              setHint("Klikněte na koncový bod oblouku");
            } else {
              const ctr = state.tempPoints[0],
                p1 = state.tempPoints[1];
              const r = Math.hypot(p1.x - ctr.x, p1.y - ctr.y);
              const startAngle = Math.atan2(p1.y - ctr.y, p1.x - ctr.x);
              const endAngle = Math.atan2(wy - ctr.y, wx - ctr.x);
              addObject({
                type: "arc",
                cx: ctr.x,
                cy: ctr.y,
                r,
                startAngle,
                endAngle,
                name: `Oblouk ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "rect":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klikněte na protější roh");
            } else {
              const rp = state.tempPoints[0];
              addObject({
                type: "rect",
                x1: rp.x,
                y1: rp.y,
                x2: wx,
                y2: wy,
                name: `Obdélník ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;
        }
      });

      drawCanvas.addEventListener("mouseup", (e) => {
        if (isPanning) {
          isPanning = false;
          drawCanvas.style.cursor = "crosshair";
        }
      });

      // Zoom kolečkem
      drawCanvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
          const mx = state.mouse.sx,
            my = state.mouse.sy;
          state.panX = mx - (mx - state.panX) * factor;
          state.panY = my - (my - state.panY) * factor;
          state.zoom *= factor;
          state.zoom = Math.max(0.05, Math.min(200, state.zoom));
          document.getElementById("statusZoom").textContent =
            `Zoom: ${(state.zoom * 100).toFixed(0)}%`;
          renderAll();
        },
        { passive: false },
      );

      // ── Klávesnice ──
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          if (state.dragging) {
            // Vrátit objekt na původní místo
            const obj = state.objects[state.dragObjIdx];
            Object.assign(obj, JSON.parse(state.dragObjSnapshot));
            state.dragging = false;
            state.dragObjIdx = null;
            drawCanvas.style.cursor = "crosshair";
          }
          state.drawing = false;
          state.tempPoints = [];
          state.selected = null;
          updateProperties();
          renderAll();
          resetHint();
        }

        // Ctrl+Z / Ctrl+Y
        if (e.ctrlKey && e.key === "z") {
          e.preventDefault();
          undo();
          return;
        }
        if (e.ctrlKey && e.key === "y") {
          e.preventDefault();
          redo();
          return;
        }
        if (e.ctrlKey && e.key === "s") {
          e.preventDefault();
          saveProject();
          return;
        }

        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
          return;

        const shortcuts = {
          v: "select",
          w: "move",
          p: "point",
          l: "line",
          k: "constr",
          c: "circle",
          a: "arc",
          r: "rect",
          m: "measure",
        };
        if (shortcuts[e.key.toLowerCase()])
          setTool(shortcuts[e.key.toLowerCase()]);
        if (e.key.toLowerCase() === "g") {
          state.snapToGrid = !state.snapToGrid;
          updateSnapBtn();
          renderAll();
        }
        if (e.key.toLowerCase() === "d") {
          state.showDimensions = !state.showDimensions;
          updateDimsBtn();
          renderAll();
        }
        if (e.key === "[") {
          cycleGridSize(-1);
        }
        if (e.key === "]") {
          cycleGridSize(1);
        }
        if (e.key.toLowerCase() === "n") {
          if (e.shiftKey) {
            showPolarDrawingDialog();
          } else {
            showNumericalInputDialog();
          }
        }
        if (e.key === "Delete" && state.selected !== null) {
          pushUndo();
          state.objects.splice(state.selected, 1);
          state.selected = null;
          updateObjectList();
          updateProperties();
          renderAll();
        }
        if (e.key === "Enter" && state.drawing && state.tool === "circle") {
          e.preventDefault();
          showCircleRadiusDialog();
        }
      });

      drawCanvas.addEventListener("contextmenu", (e) => e.preventDefault());

      // ── Měření – dialog výsledku ──
      function showMeasureResult(p1, p2, d, angle) {
        const overlay = document.createElement("div");
        overlay.className = "input-overlay";
        overlay.innerHTML = `
          <div class="input-dialog">
            <h3>📏 Výsledek měření</h3>
            <table style="width:100%;font-family:Consolas;font-size:13px;">
              <tr><td style="color:#a6adc8">Vzdálenost:</td><td style="color:#f9e2af">${d.toFixed(4)} mm</td></tr>
              <tr><td style="color:#a6adc8">Úhel:</td><td style="color:#f9e2af">${angle.toFixed(2)}°</td></tr>
              <tr><td style="color:#a6adc8">ΔX:</td><td style="color:#f5c2e7">${(p2.x - p1.x).toFixed(4)}</td></tr>
              <tr><td style="color:#a6adc8">ΔZ:</td><td style="color:#f5c2e7">${(p2.y - p1.y).toFixed(4)}</td></tr>
              <tr><td style="color:#a6adc8">Bod 1:</td><td style="color:#89b4fa">X${p1.x.toFixed(4)} Z${p1.y.toFixed(4)}</td></tr>
              <tr><td style="color:#a6adc8">Bod 2:</td><td style="color:#89b4fa">X${p2.x.toFixed(4)} Z${p2.y.toFixed(4)}</td></tr>
            </table>
            <div class="btn-row">
              <button class="btn-ok" onclick="this.closest('.input-overlay').remove()">OK</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector(".btn-ok").focus();
      }

      // ── Výběr a hledání objektu ──
      function findObjectAt(wx, wy) {
        let closest = null,
          closestDist = Infinity;
        state.objects.forEach((obj, idx) => {
          const d = distToObject(obj, wx, wy);
          if (d < closestDist) {
            closestDist = d;
            closest = idx;
          }
        });
        const threshold = 8 / state.zoom;
        return closestDist < threshold ? closest : null;
      }

      function selectObjectAt(wx, wy) {
        state.selected = findObjectAt(wx, wy);
        updateProperties();
        updateObjectList();
        renderAll();
      }

      function distToObject(obj, wx, wy) {
        switch (obj.type) {
          case "point":
            return Math.hypot(wx - obj.x, wy - obj.y);
          case "line":
          case "constr":
            return distPointToSegment(wx, wy, obj.x1, obj.y1, obj.x2, obj.y2);
          case "circle":
            return Math.abs(Math.hypot(wx - obj.cx, wy - obj.cy) - obj.r);
          case "arc": {
            const dist = Math.abs(Math.hypot(wx - obj.cx, wy - obj.cy) - obj.r);
            const angle = Math.atan2(wy - obj.cy, wx - obj.cx);
            return isAngleBetween(angle, obj.startAngle, obj.endAngle)
              ? dist
              : dist + 100;
          }
          case "rect": {
            const d1 = distPointToSegment(
              wx,
              wy,
              obj.x1,
              obj.y1,
              obj.x2,
              obj.y1,
            );
            const d2 = distPointToSegment(
              wx,
              wy,
              obj.x2,
              obj.y1,
              obj.x2,
              obj.y2,
            );
            const d3 = distPointToSegment(
              wx,
              wy,
              obj.x2,
              obj.y2,
              obj.x1,
              obj.y2,
            );
            const d4 = distPointToSegment(
              wx,
              wy,
              obj.x1,
              obj.y2,
              obj.x1,
              obj.y1,
            );
            return Math.min(d1, d2, d3, d4);
          }
          default:
            return Infinity;
        }
      }

      function distPointToSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1,
          dy = y2 - y1;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return Math.hypot(px - x1, py - y1);
        let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
      }

      function isAngleBetween(angle, start, end) {
        const norm = (a) => ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const a = norm(angle - start);
        const e = norm(end - start);
        return a <= e;
      }

      // ────────────────────────────────
      // ── VÝPOČET PRŮSEČÍKŮ ──
      // ────────────────────────────────

      function getLines(obj) {
        if (obj.type === "line" || obj.type === "constr")
          return [
            {
              x1: obj.x1,
              y1: obj.y1,
              x2: obj.x2,
              y2: obj.y2,
              isConstr: obj.type === "constr",
            },
          ];
        if (obj.type === "rect")
          return [
            { x1: obj.x1, y1: obj.y1, x2: obj.x2, y2: obj.y1 },
            { x1: obj.x2, y1: obj.y1, x2: obj.x2, y2: obj.y2 },
            { x1: obj.x2, y1: obj.y2, x2: obj.x1, y2: obj.y2 },
            { x1: obj.x1, y1: obj.y2, x2: obj.x1, y2: obj.y1 },
          ];
        return [];
      }

      function getCircles(obj) {
        if (obj.type === "circle")
          return [{ cx: obj.cx, cy: obj.cy, r: obj.r }];
        if (obj.type === "arc")
          return [
            {
              cx: obj.cx,
              cy: obj.cy,
              r: obj.r,
              startAngle: obj.startAngle,
              endAngle: obj.endAngle,
            },
          ];
        return [];
      }

      function intersectLineLine(l1, l2) {
        const { x1, y1, x2, y2 } = l1;
        const { x1: x3, y1: y3, x2: x4, y2: y4 } = l2;
        const denom = (x1 - x2) * (y3 - y4) - (y1 - y2) * (x3 - x4);
        if (Math.abs(denom) < 1e-10) return [];
        const t = ((x1 - x3) * (y3 - y4) - (y1 - y3) * (x3 - x4)) / denom;
        const u = -((x1 - x2) * (y1 - y3) - (y1 - y2) * (x1 - x3)) / denom;
        // Pro konstrukční čáry nemáme omezení t,u na [0,1] – jsou nekonečné
        const tOk = l1.isConstr ? true : t >= -1e-9 && t <= 1 + 1e-9;
        const uOk = l2.isConstr ? true : u >= -1e-9 && u <= 1 + 1e-9;
        if (tOk && uOk) {
          return [{ x: x1 + t * (x2 - x1), y: y1 + t * (y2 - y1) }];
        }
        return [];
      }

      function intersectLineCircle(line, circle) {
        const { x1, y1, x2, y2 } = line;
        const { cx, cy, r } = circle;
        const dx = x2 - x1,
          dy = y2 - y1;
        const fx = x1 - cx,
          fy = y1 - cy;
        const a = dx * dx + dy * dy;
        const b = 2 * (fx * dx + fy * dy);
        const c = fx * fx + fy * fy - r * r;
        let disc = b * b - 4 * a * c;
        if (disc < 0) return [];
        disc = Math.sqrt(disc);
        const results = [];
        for (const sign of [-1, 1]) {
          const t = (-b + sign * disc) / (2 * a);
          const tOk = line.isConstr ? true : t >= -1e-9 && t <= 1 + 1e-9;
          if (tOk) {
            const pt = { x: x1 + t * dx, y: y1 + t * dy };
            if (circle.startAngle !== undefined) {
              const angle = Math.atan2(pt.y - cy, pt.x - cx);
              if (!isAngleBetween(angle, circle.startAngle, circle.endAngle))
                continue;
            }
            results.push(pt);
          }
        }
        return results;
      }

      function intersectCircleCircle(c1, c2) {
        const dx = c2.cx - c1.cx,
          dy = c2.cy - c1.cy;
        const d = Math.hypot(dx, dy);
        if (
          d > c1.r + c2.r + 1e-10 ||
          d < Math.abs(c1.r - c2.r) - 1e-10 ||
          d < 1e-10
        )
          return [];
        const a = (c1.r * c1.r - c2.r * c2.r + d * d) / (2 * d);
        const h = Math.sqrt(Math.max(0, c1.r * c1.r - a * a));
        const px = c1.cx + (a * dx) / d,
          py = c1.cy + (a * dy) / d;
        const results = [];
        for (const sign of [-1, 1]) {
          const pt = {
            x: px + (sign * h * dy) / d,
            y: py - (sign * h * dx) / d,
          };
          let ok = true;
          if (c1.startAngle !== undefined) {
            const ang = Math.atan2(pt.y - c1.cy, pt.x - c1.cx);
            if (!isAngleBetween(ang, c1.startAngle, c1.endAngle)) ok = false;
          }
          if (c2.startAngle !== undefined) {
            const ang = Math.atan2(pt.y - c2.cy, pt.x - c2.cx);
            if (!isAngleBetween(ang, c2.startAngle, c2.endAngle)) ok = false;
          }
          if (ok) results.push(pt);
        }
        if (
          results.length === 2 &&
          Math.hypot(results[0].x - results[1].x, results[0].y - results[1].y) <
            1e-8
        )
          results.pop();
        return results;
      }

      function calculateAllIntersections() {
        const pts = [];
        const objs = state.objects;
        for (let i = 0; i < objs.length; i++) {
          for (let j = i + 1; j < objs.length; j++) {
            const lines1 = getLines(objs[i]),
              lines2 = getLines(objs[j]);
            const circs1 = getCircles(objs[i]),
              circs2 = getCircles(objs[j]);
            for (const l1 of lines1)
              for (const l2 of lines2) pts.push(...intersectLineLine(l1, l2));
            for (const l of lines1)
              for (const c of circs2) pts.push(...intersectLineCircle(l, c));
            for (const l of lines2)
              for (const c of circs1) pts.push(...intersectLineCircle(l, c));
            for (const c1 of circs1)
              for (const c2 of circs2)
                pts.push(...intersectCircleCircle(c1, c2));
          }
        }
        const unique = [];
        for (const pt of pts) {
          if (!unique.some((u) => Math.hypot(u.x - pt.x, u.y - pt.y) < 1e-6))
            unique.push(pt);
        }
        state.intersections = unique;
        updateIntersectionList();
        renderAll();
        showToast(`Nalezeno ${unique.length} průsečíků`);
      }

      // ── UI aktualizace ──
      function updateObjectList() {
        const ul = document.getElementById("objectList");
        ul.innerHTML = "";
        const icons = {
          point: "·",
          line: "/",
          constr: "⁄",
          circle: "○",
          arc: "⌒",
          rect: "□",
        };
        state.objects.forEach((obj, idx) => {
          const li = document.createElement("li");
          li.className = idx === state.selected ? "selected" : "";
          li.innerHTML = `<span><span class="obj-icon">${icons[obj.type] || "?"}</span>${obj.name || obj.type + " " + obj.id}</span><button class="del-btn" title="Smazat">✕</button>`;
          li.querySelector("span").addEventListener("click", () => {
            state.selected = idx;
            updateObjectList();
            updateProperties();
            renderAll();
          });
          li.querySelector(".del-btn").addEventListener("click", (e) => {
            e.stopPropagation();
            pushUndo();
            state.objects.splice(idx, 1);
            if (state.selected === idx) state.selected = null;
            else if (state.selected > idx) state.selected--;
            updateObjectList();
            updateProperties();
            renderAll();
          });
          ul.appendChild(li);
        });
      }

      function updateProperties() {
        const tbody = document.querySelector("#propTable tbody");
        tbody.innerHTML = "";
        if (state.selected === null) {
          tbody.innerHTML =
            '<tr><td colspan="2" style="color:#6c7086">Není vybrán objekt</td></tr>';
          return;
        }
        const obj = state.objects[state.selected];

        // Helper: přidá řádek s editovatelným inputem
        function addEditRow(label, value, onChange, step) {
          const tr = document.createElement("tr");
          const tdLabel = document.createElement("td");
          tdLabel.textContent = label;
          const tdVal = document.createElement("td");
          const input = document.createElement("input");
          input.type = "number";
          input.className = "prop-input";
          input.value = parseFloat(value).toFixed(4);
          input.step = step || "0.1";
          input.addEventListener("change", () => {
            const v = parseFloat(input.value);
            if (!isNaN(v)) {
              pushUndo();
              onChange(v);
              renderAll();
              // Refresh computed fields without losing focus
              refreshComputedProps();
            }
          });
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") input.blur();
            e.stopPropagation(); // zabránit zkratkám
          });
          tdVal.appendChild(input);
          tr.appendChild(tdLabel);
          tr.appendChild(tdVal);
          tbody.appendChild(tr);
        }

        // Helper: přidá read-only řádek
        function addInfoRow(label, value) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${label}</td><td class="prop-readonly">${value}</td>`;
          tbody.appendChild(tr);
        }

        // Helper: přidá textový input (pro jméno)
        function addTextRow(label, value, onChange) {
          const tr = document.createElement("tr");
          const tdLabel = document.createElement("td");
          tdLabel.textContent = label;
          const tdVal = document.createElement("td");
          const input = document.createElement("input");
          input.type = "text";
          input.className = "prop-name-input";
          input.value = value;
          input.addEventListener("change", () => {
            onChange(input.value);
            updateObjectList();
          });
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") input.blur();
            e.stopPropagation();
          });
          tdVal.appendChild(input);
          tr.appendChild(tdLabel);
          tr.appendChild(tdVal);
          tbody.appendChild(tr);
        }

        // Aktualizace computed polí bez rebuild
        function refreshComputedProps() {
          const computed = tbody.querySelectorAll(".prop-readonly");
          if (!computed.length) return;
          // Rebuild jen computed
          const compData = getComputedData(obj);
          computed.forEach((el, i) => {
            if (compData[i] !== undefined) el.textContent = compData[i];
          });
        }

        function getComputedData(o) {
          switch (o.type) {
            case "line":
            case "constr":
              return [
                Math.hypot(o.x2 - o.x1, o.y2 - o.y1).toFixed(4),
                (
                  (Math.atan2(o.y2 - o.y1, o.x2 - o.x1) * 180) /
                  Math.PI
                ).toFixed(2) + "°",
              ];
            case "circle":
              return [(o.r * 2).toFixed(4), (2 * Math.PI * o.r).toFixed(4)];
            case "rect":
              return [
                Math.abs(o.x2 - o.x1).toFixed(4),
                Math.abs(o.y2 - o.y1).toFixed(4),
              ];
            default:
              return [];
          }
        }

        // Typ (read-only)
        addInfoRow("Typ", typeLabel(obj.type));
        // Název (editovatelný)
        addTextRow("Název", obj.name || "", (v) => {
          obj.name = v;
        });

        switch (obj.type) {
          case "point":
            addEditRow("X", obj.x, (v) => {
              obj.x = v;
            });
            addEditRow("Z", obj.y, (v) => {
              obj.y = v;
            });
            break;
          case "line":
          case "constr":
            addEditRow("X1", obj.x1, (v) => {
              obj.x1 = v;
            });
            addEditRow("Z1", obj.y1, (v) => {
              obj.y1 = v;
            });
            addEditRow("X2", obj.x2, (v) => {
              obj.x2 = v;
            });
            addEditRow("Z2", obj.y2, (v) => {
              obj.y2 = v;
            });
            addInfoRow(
              "Délka",
              Math.hypot(obj.x2 - obj.x1, obj.y2 - obj.y1).toFixed(4),
            );
            addInfoRow(
              "Úhel",
              (
                (Math.atan2(obj.y2 - obj.y1, obj.x2 - obj.x1) * 180) /
                Math.PI
              ).toFixed(2) + "°",
            );
            break;
          case "circle":
            addEditRow("Střed X", obj.cx, (v) => {
              obj.cx = v;
            });
            addEditRow("Střed Z", obj.cy, (v) => {
              obj.cy = v;
            });
            addEditRow(
              "Poloměr",
              obj.r,
              (v) => {
                if (v > 0) obj.r = v;
              },
              "0.01",
            );
            addInfoRow("Průměr", (obj.r * 2).toFixed(4));
            addInfoRow("Obvod", (2 * Math.PI * obj.r).toFixed(4));
            break;
          case "arc":
            addEditRow("Střed X", obj.cx, (v) => {
              obj.cx = v;
            });
            addEditRow("Střed Z", obj.cy, (v) => {
              obj.cy = v;
            });
            addEditRow(
              "Poloměr",
              obj.r,
              (v) => {
                if (v > 0) obj.r = v;
              },
              "0.01",
            );
            addEditRow(
              "Start°",
              (obj.startAngle * 180) / Math.PI,
              (v) => {
                obj.startAngle = (v * Math.PI) / 180;
              },
              "1",
            );
            addEditRow(
              "Konec°",
              (obj.endAngle * 180) / Math.PI,
              (v) => {
                obj.endAngle = (v * Math.PI) / 180;
              },
              "1",
            );
            break;
          case "rect":
            addEditRow("X1", obj.x1, (v) => {
              obj.x1 = v;
            });
            addEditRow("Z1", obj.y1, (v) => {
              obj.y1 = v;
            });
            addEditRow("X2", obj.x2, (v) => {
              obj.x2 = v;
            });
            addEditRow("Z2", obj.y2, (v) => {
              obj.y2 = v;
            });
            addInfoRow("Šířka", Math.abs(obj.x2 - obj.x1).toFixed(4));
            addInfoRow("Výška", Math.abs(obj.y2 - obj.y1).toFixed(4));
            break;
        }
      }

      function updateIntersectionList() {
        const ul = document.getElementById("intersectionList");
        ul.innerHTML = "";
        if (state.intersections.length === 0) {
          ul.innerHTML =
            '<li style="color:#6c7086;cursor:default">Žádné průsečíky</li>';
          return;
        }
        state.intersections.forEach((pt, i) => {
          const li = document.createElement("li");
          li.innerHTML = `P${i + 1}:  X=${pt.x.toFixed(4)}  Z=${pt.y.toFixed(4)} <span class="copy-hint">klik=kopírovat</span>`;

              .writeText(text)
              .then(() => showToast(`Zkopírováno: ${text}`));

      function setTool(tool) {
        state.tool = tool;
        state.drawing = false;
        state.tempPoints = [];
        if (state.dragging) {
          const obj = state.objects[state.dragObjIdx];
          Object.assign(obj, JSON.parse(state.dragObjSnapshot));
          state.dragging = false;
          state.dragObjIdx = null;
        }
        drawCanvas.style.cursor = tool === "move" ? "move" : "crosshair";
        document
          .querySelectorAll("[data-tool]")
          .forEach((b) =>
            b.classList.toggle("active", b.dataset.tool === tool),

          "Nástroj: " + toolLabel(tool);
