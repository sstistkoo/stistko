      // ── Velikost mřížky ──
      const gridSizes = [1, 2, 5, 10, 20, 50];

      function updateGridDisplay() {
        const el = document.getElementById("statusGrid");
        if (el) el.textContent = `Mřížka: ${state.gridSize}`;
      }

      function cycleGridSize(direction) {
        const idx = gridSizes.indexOf(state.gridSize);
        let newIdx;
        if (idx === -1) {
          newIdx = gridSizes.findIndex((s) => s >= state.gridSize);
          if (newIdx === -1) newIdx = gridSizes.length - 1;
        } else {
          newIdx = idx + direction;
        }
        newIdx = Math.max(0, Math.min(gridSizes.length - 1, newIdx));
        state.gridSize = gridSizes[newIdx];
        updateGridDisplay();
        renderAll();
        showToast(`Mřížka: ${state.gridSize}`);
      }

      document.getElementById("statusGrid").addEventListener("click", () => {
        cycleGridSize(1);
      });
      document
        .getElementById("statusGrid")
        .addEventListener("contextmenu", (e) => {
          e.preventDefault();
          cycleGridSize(-1);
        });

      // ── Save / Load ──
      function saveProject() {
        const data = {
          version: 2,
          objects: state.objects,
          intersections: state.intersections,
          nextId: state.nextId,
          gridSize: state.gridSize,
        };
        localStorage.setItem("skica_project", JSON.stringify(data));
        showToast("Projekt uložen");
      }

      function loadProject() {
        const raw = localStorage.getItem("skica_project");
        if (!raw) {
          showToast("Žádný uložený projekt");
          return;
        }
        try {
          const data = JSON.parse(raw);
          pushUndo();
          state.objects = data.objects || [];
          state.intersections = data.intersections || [];
          state.nextId = data.nextId || 1;
          if (data.gridSize && data.gridSize > 0)
            state.gridSize = data.gridSize;
          state.selected = null;
          updateObjectList();
          updateProperties();
          updateIntersectionList();
          renderAll();
          showToast(`Načteno ${state.objects.length} objektů`);
        } catch (e) {
          showToast("Chyba při načítání projektu");
        }
      }

      function exportProjectFile() {
        const data = {
          version: 2,
          objects: state.objects,
          intersections: state.intersections,
          nextId: state.nextId,
          gridSize: state.gridSize,
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {
          type: "application/json",
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "skica_projekt.json";
        a.click();
        URL.revokeObjectURL(a.href);
        showToast("Projekt exportován jako soubor");
      }

      function importProjectFile() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              const data = JSON.parse(ev.target.result);
              pushUndo();
              state.objects = data.objects || [];
              state.intersections = data.intersections || [];
              state.nextId = data.nextId || 1;
              if (data.gridSize && data.gridSize > 0)
                state.gridSize = data.gridSize;
              state.selected = null;
              updateObjectList();
              updateProperties();
              updateIntersectionList();
              renderAll();
              showToast(`Importováno ${state.objects.length} objektů`);
            } catch (err) {
              showToast("Chyba při čtení souboru");
            }
          };
          reader.readAsText(file);
        });
        input.click();
      }

      document.getElementById("btnSave").addEventListener("click", saveProject);
      document.getElementById("btnLoad").addEventListener("click", () => {
        // Nabídka: localStorage nebo soubor
        const overlay = document.createElement("div");
        overlay.className = "input-overlay";
        overlay.innerHTML = `
          <div class="input-dialog">
            <h3>📂 Načíst projekt</h3>
            <div class="btn-row" style="flex-direction:column;gap:8px;align-items:stretch">
              <button class="btn-ok" id="loadLocal" style="width:100%">Načíst z paměti prohlížeče</button>
              <button class="btn-ok" id="loadFile" style="width:100%">Importovat ze souboru (.json)</button>
              <button class="btn-ok" id="exportFile" style="width:100%;background:#f9e2af;border-color:#f9e2af">Exportovat do souboru</button>
              <button class="btn-cancel" onclick="this.closest('.input-overlay').remove()" style="width:100%">Zrušit</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        overlay.querySelector("#loadLocal").addEventListener("click", () => {
          overlay.remove();
          loadProject();
        });
        overlay.querySelector("#loadFile").addEventListener("click", () => {
          overlay.remove();
          importProjectFile();
        });
        overlay.querySelector("#exportFile").addEventListener("click", () => {
          overlay.remove();
          exportProjectFile();
        });
      });

      // ── CNC Export ──
      document.getElementById("btnExport").addEventListener("click", () => {
        let out = "; === SKICA – CNC Soustružník (X,Z) ===\n";
        out += `; Datum: ${new Date().toLocaleString("cs")}\n`;
        out += `; Počet objektů: ${state.objects.length}\n`;
        out += `; Průsečíků: ${state.intersections.length}\n\n`;

        out += "; --- Objekty ---\n";
        state.objects.forEach((obj) => {
          if (obj.type === "constr") return; // Konstrukční čáry se neexportují
          switch (obj.type) {
            case "point":
              out += `; ${obj.name}\nG00 X${obj.x.toFixed(4)} Z${obj.y.toFixed(4)}\n`;
              break;
            case "line":
              out += `; ${obj.name} (délka: ${Math.hypot(obj.x2 - obj.x1, obj.y2 - obj.y1).toFixed(4)})\n`;
              out += `G00 X${obj.x1.toFixed(4)} Z${obj.y1.toFixed(4)}\nG01 X${obj.x2.toFixed(4)} Z${obj.y2.toFixed(4)}\n`;
              break;
            case "circle":
              out += `; ${obj.name} (R: ${obj.r.toFixed(4)})\n`;
              out += `G00 X${(obj.cx + obj.r).toFixed(4)} Z${obj.cy.toFixed(4)}\n`;
              out += `G02 X${(obj.cx + obj.r).toFixed(4)} Z${obj.cy.toFixed(4)} I${(-obj.r).toFixed(4)} K0.0000\n`;
              break;
            case "arc":
              out += `; ${obj.name} (R: ${obj.r.toFixed(4)})\n`;
              const sx = obj.cx + obj.r * Math.cos(obj.startAngle),
                sy = obj.cy + obj.r * Math.sin(obj.startAngle);
              const ex = obj.cx + obj.r * Math.cos(obj.endAngle),
                ey = obj.cy + obj.r * Math.sin(obj.endAngle);
              out += `G00 X${sx.toFixed(4)} Z${sy.toFixed(4)}\nG02 X${ex.toFixed(4)} Z${ey.toFixed(4)} R${obj.r.toFixed(4)}\n`;
              break;
            case "rect":
              out += `; ${obj.name} (${Math.abs(obj.x2 - obj.x1).toFixed(2)} × ${Math.abs(obj.y2 - obj.y1).toFixed(2)})\n`;
              out += `G00 X${obj.x1.toFixed(4)} Z${obj.y1.toFixed(4)}\n`;
              out += `G01 X${obj.x2.toFixed(4)} Z${obj.y1.toFixed(4)}\n`;
              out += `G01 X${obj.x2.toFixed(4)} Z${obj.y2.toFixed(4)}\n`;
              out += `G01 X${obj.x1.toFixed(4)} Z${obj.y2.toFixed(4)}\n`;
              out += `G01 X${obj.x1.toFixed(4)} Z${obj.y1.toFixed(4)}\n`;
              break;
          }
          out += "\n";
        });

        if (state.intersections.length > 0) {
          out += "; --- Průsečíky ---\n";
          state.intersections.forEach((pt, i) => {
            out += `; P${i + 1}: X${pt.x.toFixed(4)} Z${pt.y.toFixed(4)}\n`;
          });
        }
        out += "\n; === Konec ===\n";
        document.getElementById("cncOutput").textContent = out;
        navigator.clipboard
          .writeText(out)
          .then(() => showToast("CNC export zkopírován do schránky"))
          .catch(() => showToast("CNC export vygenerován v panelu"));
      });

      // ── Dialog pro zadání poloměru ──
      function showCircleRadiusDialog() {
        const cp = state.tempPoints[0];
        const overlay = document.createElement("div");
        overlay.className = "input-overlay";
        overlay.innerHTML = `
          <div class="input-dialog">
            <h3>Kružnice – zadání poloměru</h3>
            <label>Střed: X=${cp.x.toFixed(2)}, Z=${cp.y.toFixed(2)}</label>
            <label>Poloměr (mm):</label>
            <input type="number" id="dlgRadius" step="0.1" min="0.001" value="10" autofocus>
            <div class="btn-row">
              <button class="btn-cancel" onclick="this.closest('.input-overlay').remove()">Zrušit</button>
              <button class="btn-ok" id="dlgOk">OK</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        const inp = overlay.querySelector("#dlgRadius");
        inp.focus();
        inp.select();
        const accept = () => {
          const r = parseFloat(inp.value);
          if (r > 0) {
            addObject({
              type: "circle",
              cx: cp.x,
              cy: cp.y,
              r,
              name: `Kružnice ${state.nextId}`,

      // ── Numerický vstup – dialog pro přesné zadání souřadnic ──
      document
        .getElementById("btnNumInput")
        .addEventListener("click", showNumericalInputDialog);

      function showNumericalInputDialog() {
        const overlay = document.createElement("div");
        overlay.className = "input-overlay";
        overlay.innerHTML = `
          <div class="input-dialog" style="min-width:400px">
            <h3>🔢 Číselné zadání objektu</h3>
            <label>Typ objektu:</label>
            <select id="numType">
              <option value="point">Bod</option>
              <option value="line" selected>Úsečka</option>
              <option value="constr">Konstrukční čára</option>

              html = `<div class="input-row"><div><label>X:</label><input type="number" id="nx" step="0.1" value="0"></div>
                      <div><label>Z:</label><input type="number" id="ny" step="0.1" value="0"></div></div>`;
              break;
            case "line":
            case "constr":
              html = `<div class="input-row"><div><label>X1:</label><input type="number" id="nx1" step="0.1" value="0"></div>
                      <div><label>Z1:</label><input type="number" id="ny1" step="0.1" value="0"></div></div>
                      <div class="input-row"><div><label>X2:</label><input type="number" id="nx2" step="0.1" value="0"></div>

            case "circle":
              html = `<div class="input-row"><div><label>Střed X:</label><input type="number" id="ncx" step="0.1" value="0"></div>
                      <div><label>Střed Z:</label><input type="number" id="ncy" step="0.1" value="0"></div></div>
                      <div class="input-row"><div><label>Poloměr:</label><input type="number" id="nr" step="0.1" value="10"></div>
                      <div></div></div>`;
              break;
            case "arc":
              html = `<div class="input-row"><div><label>Střed X:</label><input type="number" id="ncx" step="0.1" value="0"></div>
                      <div><label>Střed Z:</label><input type="number" id="ncy" step="0.1" value="0"></div></div>
                      <div class="input-row"><div><label>Poloměr:</label><input type="number" id="nr" step="0.1" value="10"></div></div>
                      <div class="input-row"><div><label>Start (°):</label><input type="number" id="nsa" step="1" value="0"></div>
                      <div><label>Konec (°):</label><input type="number" id="nea" step="1" value="90"></div></div>`;

              html = `<div class="input-row"><div><label>X1:</label><input type="number" id="nx1" step="0.1" value="0"></div>

                });

          } catch (err) {

        let refX = 0,
          refZ = 0;
        if (state.selected !== null) {
          const sel = state.objects[state.selected];
          if (sel.type === "point") {
            refX = sel.x;
            refZ = sel.y;
          } else if (sel.type === "line" || sel.type === "constr") {
            refX = sel.x2;
            refZ = sel.y2;
          } else if (sel.type === "circle" || sel.type === "arc") {
            refX = sel.cx;
            refZ = sel.cy;
          }
        }

        const overlay = document.createElement("div");
        overlay.className = "input-overlay";
        overlay.innerHTML = `
          <div class="input-dialog" style="min-width:460px">
            <h3>📐 Polární kreslení z bodu</h3>
            <p style="font-size:12px;color:#6c7086;margin-bottom:10px">
              Zadejte referenční bod a pak přidávejte segmenty pomocí délky a úhlu.<br>
              Vhodné pro překreslování z výkresů se zadanými hodnotami.
            </p>
            <label>Referenční bod:</label>
            <div class="input-row">
              <div><label>X:</label><input type="number" id="polRefX" step="0.1" value="${refX}"></div>
              <div><label>Z:</label><input type="number" id="polRefZ" step="0.1" value="${refZ}"></div>
            </div>
            <div style="display:flex;gap:6px;margin-bottom:10px">
              <button class="btn-ok" id="polMarkRef" style="font-size:11px;padding:3px 8px">📍 Označit ref. bod</button>
              <button class="btn-ok" id="polFromSelected" style="font-size:11px;padding:3px 8px;background:#a6e3a1;border-color:#a6e3a1">📌 Z vybraného objektu</button>
            </div>
            <hr style="border-color:#45475a;margin:8px 0">
            <label>Segment (polární souřadnice od ref. bodu):</label>
            <div class="input-row">
              <div><label>Délka:</label><input type="number" id="polLen" step="0.1" value="10"></div>
              <div><label>Úhel (°):</label><input type="number" id="polAng" step="0.1" value="0"></div>
            </div>
            <div class="input-row">
              <div><label>Typ:</label>
                <select id="polType" style="width:100%">
                  <option value="line" selected>Úsečka</option>
                  <option value="constr">Konstrukční čára</option>
                  <option value="point">Bod (na konci)</option>
                </select>
              </div>
              <div style="display:flex;align-items:end">
                <label style="font-size:11px;display:flex;align-items:center;gap:4px;cursor:pointer">
                  <input type="checkbox" id="polChain" checked> Řetězit (konec → nový ref.)
                </label>
              </div>
            </div>
            <div id="polHistory" style="max-height:120px;overflow-y:auto;font-size:11px;font-family:Consolas;color:#a6adc8;margin:8px 0;padding:4px;background:#11111b;border-radius:4px;display:none"></div>
            <div class="btn-row">
              <button class="btn-cancel" id="polClose">Zavřít</button>
              <button class="btn-ok" id="polAdd">➕ Přidat segment</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);

        const polRefX = overlay.querySelector("#polRefX");
        const polRefZ = overlay.querySelector("#polRefZ");
        const polLen = overlay.querySelector("#polLen");
        const polAng = overlay.querySelector("#polAng");
        const polType = overlay.querySelector("#polType");
        const polChain = overlay.querySelector("#polChain");
        const polHistory = overlay.querySelector("#polHistory");
        let segCount = 0;

        // Označit referenční bod na plátně
        overlay.querySelector("#polMarkRef").addEventListener("click", () => {
          const rx = parseFloat(polRefX.value);
          const rz = parseFloat(polRefZ.value);
          if (isNaN(rx) || isNaN(rz)) return;
          addObject({
            type: "point",
            x: rx,
            y: rz,
            name: `Ref ${state.nextId}`,
          });
          showToast(`Referenční bod X${rx} Z${rz} vytvořen`);
        });

        // Načíst z vybraného objektu
        overlay
          .querySelector("#polFromSelected")
          .addEventListener("click", () => {
            if (state.selected === null) {
              showToast("Žádný vybraný objekt");
              return;
            }
            const sel = state.objects[state.selected];
            if (sel.type === "point") {
              polRefX.value = sel.x;
              polRefZ.value = sel.y;
            } else if (sel.type === "line" || sel.type === "constr") {
              polRefX.value = sel.x2;
              polRefZ.value = sel.y2;
            } else if (sel.type === "circle" || sel.type === "arc") {
              polRefX.value = sel.cx;
              polRefZ.value = sel.cy;
            } else if (sel.type === "rect") {
              polRefX.value = sel.x1;
              polRefZ.value = sel.y1;
            }
            showToast("Ref. bod načten z vybraného objektu");
          });

        // Přidat segment
        overlay.querySelector("#polAdd").addEventListener("click", () => {
          const rx = parseFloat(polRefX.value);
          const rz = parseFloat(polRefZ.value);
          const len = parseFloat(polLen.value);
          const angDeg = parseFloat(polAng.value);
          if (
            isNaN(rx) ||
            isNaN(rz) ||
            isNaN(len) ||
            isNaN(angDeg) ||
            len <= 0
          ) {
            showToast("Zkontrolujte hodnoty (délka musí být > 0)");
            return;
          }

          const rad = (angDeg * Math.PI) / 180;
          const endX = rx + len * Math.cos(rad);
          const endZ = rz + len * Math.sin(rad);
          const typ = polType.value;

          if (typ === "point") {
            addObject({
              type: "point",
              x: endX,
              y: endZ,
              name: `Bod ${state.nextId}`,
            });
          } else {
            addObject({
              type: typ === "constr" ? "constr" : "line",
              x1: rx,
              y1: rz,
              x2: endX,
              y2: endZ,
              name: `${typ === "constr" ? "Konstr" : "Úsečka"} ${state.nextId}`,
              dashed: typ === "constr",
            });
          }

          segCount++;
          polHistory.style.display = "";
          polHistory.innerHTML += `<div>#${segCount}: X${rx.toFixed(2)} Z${rz.toFixed(2)} → d=${len} ∠${angDeg}° → X${endX.toFixed(2)} Z${endZ.toFixed(2)}</div>`;
          polHistory.scrollTop = polHistory.scrollHeight;

          // Řetězení: konec se stane novým referenčním bodem
          if (polChain.checked) {
            polRefX.value = endX.toFixed(4);
            polRefZ.value = endZ.toFixed(4);
          }

          polLen.focus();
          polLen.select();
          showToast(`Segment #${segCount} přidán`);
        });

        overlay
          .querySelector("#polClose")
          .addEventListener("click", () => overlay.remove());

        overlay.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && e.target.tagName === "INPUT")
            overlay.querySelector("#polAdd").click();
          if (e.key === "Escape") overlay.remove();
        });

        polLen.focus();
      }

      // ── Auto-load při startu ──
      function tryAutoLoad() {
        const raw = localStorage.getItem("skica_project");
        if (raw) {
          try {
            const data = JSON.parse(raw);
            if (data.objects && data.objects.length > 0) {
              state.objects = data.objects;
              state.intersections = data.intersections || [];
              state.nextId = data.nextId || 1;
              if (data.gridSize && data.gridSize > 0)
                state.gridSize = data.gridSize;
              updateObjectList();
              updateProperties();
              updateIntersectionList();
            }
          } catch (e) {}
        }
      }

      // ── Auto-save ──
      setInterval(() => {
        if (state.objects.length > 0) {
          const data = {
            version: 2,
            objects: state.objects,
            intersections: state.intersections,
            nextId: state.nextId,
            gridSize: state.gridSize,
          };
          localStorage.setItem("skica_project", JSON.stringify(data));
        }
      }, 30000); // každých 30s

      // ── Inicializace ──
      tryAutoLoad();
      resizeCanvases();
      resetHint();
      updateDimsBtn();

      // ── Mobile: detekce ──
      const isMobile = () => window.innerWidth <= 900;

      // ── Mobile: Toolbar toggle ──
      const mobileToolbarToggle = document.getElementById(
        "mobileToolbarToggle",
      );
      const topbar = document.getElementById("topbar");
      mobileToolbarToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        topbar.classList.toggle("mobile-open");
        // Zavřít sidebar pokud otevřen
        sidebar.classList.remove("mobile-open");
        sidebarOverlay.classList.remove("active");
      });
      // Zavřít toolbar po výběru nástroje na mobilu
      topbar.addEventListener("click", (e) => {
        if (isMobile() && e.target.closest(".tool-btn")) {
          setTimeout(() => topbar.classList.remove("mobile-open"), 150);
        }
      });

      // ── Mobile: Sidebar toggle ──
      const sidebar = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebarOverlay");
      const mobileSidebarToggle = document.getElementById(
        "mobileSidebarToggle",
      );
      mobileSidebarToggle.addEventListener("click", (e) => {
        e.stopPropagation();
        sidebar.classList.toggle("mobile-open");
        sidebarOverlay.classList.toggle(
          "active",
          sidebar.classList.contains("mobile-open"),
        );
        // Zavřít toolbar pokud otevřen
        topbar.classList.remove("mobile-open");
      });
      sidebarOverlay.addEventListener("click", () => {
        sidebar.classList.remove("mobile-open");
        sidebarOverlay.classList.remove("active");
      });

      // ── Mobile: coord bar update ──
      const mobileCoordBar = document.getElementById("mobileCoordBar");

      // ── Touch events pro canvas ──
      let touchState = {
        lastTap: 0,
        touches: [],
        pinchStartDist: 0,
        pinchStartZoom: 1,
        pinchMidX: 0,
        pinchMidY: 0,
        panActive: false,
        wasMultiTouch: false,
        panStartX: 0,
        panStartY: 0,
        panStartPX: 0,
        panStartPY: 0,
      };

      function getTouchPos(touch) {
        const rect = drawCanvas.getBoundingClientRect();
        return {
          sx: touch.clientX - rect.left,
          sy: touch.clientY - rect.top,
        };
      }

      drawCanvas.addEventListener(
        "touchstart",
        (e) => {
          e.preventDefault();
          const touches = e.touches;

          if (touches.length === 2) {
            // Pinch zoom / dvouprstý posun
            touchState.wasMultiTouch = true;
            const t1 = getTouchPos(touches[0]);
            const t2 = getTouchPos(touches[1]);
            touchState.pinchStartDist = Math.hypot(
              t1.sx - t2.sx,
              t1.sy - t2.sy,
            );
            touchState.pinchStartZoom = state.zoom;
            touchState.pinchMidX = (t1.sx + t2.sx) / 2;
            touchState.pinchMidY = (t1.sy + t2.sy) / 2;
            touchState.panStartX =
              (touches[0].clientX + touches[1].clientX) / 2;
            touchState.panStartY =
              (touches[0].clientY + touches[1].clientY) / 2;
            touchState.panStartPX = state.panX;
            touchState.panStartPY = state.panY;
            touchState.panActive = true;
            return;
          }

          if (touches.length === 1) {
            const tp = getTouchPos(touches[0]);
            state.mouse.sx = tp.sx;
            state.mouse.sy = tp.sy;
            let [wx, wy] = screenToWorld(tp.sx, tp.sy);
            if (state.snapToGrid || state.snapToPoints)
              [wx, wy] = snapPt(wx, wy);
            state.mouse.x = wx;
            state.mouse.y = wy;
            updateMobileCoords(wx, wy);
            renderAll();
          }
        },
        { passive: false },
      );

      drawCanvas.addEventListener(
        "touchmove",
        (e) => {
          e.preventDefault();
          const touches = e.touches;

          if (touches.length === 2 && touchState.panActive) {
            // Pinch zoom
            const t1 = getTouchPos(touches[0]);
            const t2 = getTouchPos(touches[1]);
            const dist = Math.hypot(t1.sx - t2.sx, t1.sy - t2.sy);
            const factor = dist / touchState.pinchStartDist;
            const newZoom = Math.max(
              0.05,
              Math.min(200, touchState.pinchStartZoom * factor),
            );

            // Zoom kolem středu pinche
            const midSX = touchState.pinchMidX;
            const midSY = touchState.pinchMidY;
            state.zoom = newZoom;
            state.panX =
              midSX -
              (midSX - touchState.panStartPX) *
                (newZoom / touchState.pinchStartZoom);
            state.panY =
              midSY -
              (midSY - touchState.panStartPY) *
                (newZoom / touchState.pinchStartZoom);

            // Dvouprstý posun
            const curMidX = (touches[0].clientX + touches[1].clientX) / 2;
            const curMidY = (touches[0].clientY + touches[1].clientY) / 2;
            state.panX += curMidX - touchState.panStartX;
            state.panY += curMidY - touchState.panStartY;
            touchState.panStartX = curMidX;
            touchState.panStartY = curMidY;

            document.getElementById("statusZoom").textContent =
              `Zoom: ${(state.zoom * 100).toFixed(0)}%`;
            renderAll();
            return;
          }

          if (touches.length === 1) {
            const tp = getTouchPos(touches[0]);
            state.mouse.sx = tp.sx;
            state.mouse.sy = tp.sy;
            let [wx, wy] = screenToWorld(tp.sx, tp.sy);
            if (state.snapToGrid || state.snapToPoints)
              [wx, wy] = snapPt(wx, wy);
            state.mouse.x = wx;
            state.mouse.y = wy;

            let extra = "";
            if (state.drawing && state.tempPoints.length > 0) {
              const ref = state.tempPoints[state.tempPoints.length - 1];
              const ddx = wx - ref.x,
                ddy = wy - ref.y;
              const dist = Math.hypot(ddx, ddy);
              const ang = (Math.atan2(ddy, ddx) * 180) / Math.PI;
              extra = `  d=${dist.toFixed(1)} ∠${ang.toFixed(1)}°`;
            }
            updateMobileCoords(wx, wy, extra);

            // Přetahování objektu
            if (state.dragging && state.dragObjIdx !== null) {
              const obj = state.objects[state.dragObjIdx];
              const dx = wx - state.dragStartWorld.x;
              const dy = wy - state.dragStartWorld.y;
              const snapShot = JSON.parse(state.dragObjSnapshot);
              Object.assign(obj, snapShot);
              moveObject(obj, dx, dy);
            }

            renderAll();
          }
        },
        { passive: false },
      );

      drawCanvas.addEventListener(
        "touchend",
        (e) => {
          e.preventDefault();

          if (e.touches.length === 0 && touchState.panActive) {
            touchState.panActive = false;
            return;
          }

          // Jednoprstový tap = klik (jen pokud nebylo panning dvěma prsty)
          if (
            e.changedTouches.length === 1 &&
            !touchState.panActive &&
            !touchState.wasMultiTouch
          ) {
            const tp = getTouchPos(e.changedTouches[0]);
            state.mouse.sx = tp.sx;
            state.mouse.sy = tp.sy;
            let [wx, wy] = screenToWorld(tp.sx, tp.sy);
            if (state.snapToGrid || state.snapToPoints)
              [wx, wy] = snapPt(wx, wy);
            state.mouse.x = wx;
            state.mouse.y = wy;

            // Simulovat mousedown logiku
            handleCanvasClick(wx, wy);
            updateMobileCoords(wx, wy);
          }

          if (e.touches.length < 2) {
            touchState.panActive = false;
          }
          if (e.touches.length === 0) {
            touchState.wasMultiTouch = false;
          }
        },
        { passive: false },
      );

      // Extrahovat klik logiku do společné funkce
      function handleCanvasClick(wx, wy) {
        switch (state.tool) {
          case "select":
            selectObjectAt(wx, wy);
            break;

          case "move":
            if (!state.dragging) {
              const idx = findObjectAt(wx, wy);
              if (idx !== null) {
                pushUndo();
                state.dragging = true;
                state.dragObjIdx = idx;
                state.dragStartWorld = { x: wx, y: wy };
                state.dragObjSnapshot = JSON.stringify(state.objects[idx]);
                state.selected = idx;
                updateProperties();
                setHint("Klepněte pro umístění");
              }
            } else {
              state.dragging = false;
              state.dragObjIdx = null;
              updateProperties();
              resetHint();
            }
            break;

          case "point":
            addObject({
              type: "point",
              x: wx,
              y: wy,
              name: `Bod ${state.nextId}`,
            });
            break;

          case "line":
          case "constr":
          case "measure":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klepněte na koncový bod");
            } else {
              const tp = state.tempPoints[0];
              if (state.tool === "line" || state.tool === "constr") {
                addObject({
                  type: state.tool === "constr" ? "constr" : "line",
                  x1: tp.x,
                  y1: tp.y,
                  x2: wx,
                  y2: wy,
                  name: `${state.tool === "constr" ? "Konstr" : "Úsečka"} ${state.nextId}`,
                  dashed: state.tool === "constr",
                });
              } else {
                const d = Math.hypot(wx - tp.x, wy - tp.y);
                const angle =
                  (Math.atan2(wy - tp.y, wx - tp.x) * 180) / Math.PI;
                showMeasureResult(tp, { x: wx, y: wy }, d, angle);
              }
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "circle":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klepněte pro poloměr");
            } else {
              const cp = state.tempPoints[0];
              const r = Math.hypot(wx - cp.x, wy - cp.y);
              addObject({
                type: "circle",
                cx: cp.x,
                cy: cp.y,
                r,
                name: `Kružnice ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "arc":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klepněte na počáteční bod oblouku");
            } else if (state.tempPoints.length === 1) {
              state.tempPoints.push({ x: wx, y: wy });
              setHint("Klepněte na koncový bod oblouku");
            } else {
              const ctr = state.tempPoints[0],
                p1 = state.tempPoints[1];
              const r = Math.hypot(p1.x - ctr.x, p1.y - ctr.y);
              const startAngle = Math.atan2(p1.y - ctr.y, p1.x - ctr.x);
              const endAngle = Math.atan2(wy - ctr.y, wx - ctr.x);
              addObject({
                type: "arc",
                cx: ctr.x,
                cy: ctr.y,
                r,
                startAngle,
                endAngle,
                name: `Oblouk ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;

          case "rect":
            if (!state.drawing) {
              state.drawing = true;
              state.tempPoints = [{ x: wx, y: wy }];
              setHint("Klepněte na protější roh");
            } else {
              const rp = state.tempPoints[0];
              addObject({
                type: "rect",
                x1: rp.x,
                y1: rp.y,
                x2: wx,
                y2: wy,
                name: `Obdélník ${state.nextId}`,
              });
              state.drawing = false;
              state.tempPoints = [];
              resetHint();
            }
            break;
        }
      }

      function updateMobileCoords(wx, wy, extra) {
        extra = extra || "";
        const text = `X: ${wx.toFixed(3)}   Z: ${wy.toFixed(3)}${extra}`;
        mobileCoordBar.textContent = text;
        document.getElementById("coordDisplay").textContent = text;
      }

      // Prevent default touch on body to avoid scroll/zoom
      document.body.addEventListener(
        "touchmove",
        (e) => {
          if (e.target.closest("#canvasWrap")) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      console.log(
        "%c SKICA – CAD pro CNC soustružník v3 (X,Z) ",
        "background:#89b4fa;color:#1e1e2e;font-size:18px;font-weight:bold;padding:4px 12px;border-radius:4px;",
      );
      console.log(
        "Klávesové zkratky: V=Výběr, W=Přesun, P=Bod, L=Úsečka, K=Konstr., C=Kružnice, A=Oblouk, R=Obdélník, M=Měření, G=Snap, D=Kóty, N=Čísla, Shift+N=Polární, Ctrl+Z=Zpět, Ctrl+Y=Vpřed, Ctrl+S=Uložit, Del=Smazat",
      );
    </script>
  </body>
</html>
