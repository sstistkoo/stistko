<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Gear Debug</title>
    <style>
      body {
        background: #1e1e2e;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
      }
      canvas {
        background: #181825;
        border: 1px solid #45475a;
      }
      h3 {
        color: #cdd6f4;
        font-family: sans-serif;
        width: 100%;
        margin: 5px 0;
      }
    </style>
  </head>
  <body>
    <h3>Gear Profile Debug — klikni pro reset</h3>
    <script>
      const inv = (phi) => Math.tan(phi) - phi;
      const invAt = (rb, r) =>
        r <= rb ? 0 : ((p) => Math.tan(p) - p)(Math.acos(rb / r));

      function drawProfile(canvasId, title, vertices, cx, cy, scale) {
        const c = document.createElement("canvas");
        c.width = 400;
        c.height = 400;
        document.body.appendChild(c);
        const ctx = c.getContext("2d");
        ctx.fillStyle = "#1e1e2e";
        ctx.fillRect(0, 0, 400, 400);
        ctx.fillStyle = "#cdd6f4";
        ctx.font = "13px sans-serif";
        ctx.fillText(title + " (" + vertices.length + " verts)", 10, 20);

        ctx.save();
        ctx.translate(200 + cx * scale, 200 + cy * scale);
        ctx.scale(scale, -scale);

        // Profile
        ctx.beginPath();
        ctx.moveTo(vertices[0].x, vertices[0].y);
        for (let i = 1; i < vertices.length; i++)
          ctx.lineTo(vertices[i].x, vertices[i].y);
        ctx.closePath();
        ctx.strokeStyle = "#a6e3a1";
        ctx.lineWidth = 1 / scale;
        ctx.stroke();

        // Vertices
        for (let i = 0; i < vertices.length; i++) {
          ctx.beginPath();
          ctx.arc(vertices[i].x, vertices[i].y, 1.5 / scale, 0, Math.PI * 2);
          ctx.fillStyle =
            i % 14 < 6
              ? "#f38ba8"
              : i % 14 < 7
                ? "#fab387"
                : i % 14 < 13
                  ? "#89b4fa"
                  : "#f9e2af";
          ctx.fill();
        }
        ctx.restore();
      }

      // === EXTERNAL GEAR (reference) ===
      function genExternal(m, z, alpha, x, steps, cx, cy) {
        const aRad = (alpha * Math.PI) / 180;
        const rp = (m * z) / 2,
          rb = rp * Math.cos(aRad);
        const ra = (m * (z + 2 + 2 * x)) / 2,
          rf = Math.max((m * (z - 2.5 + 2 * x)) / 2, m * 0.1);
        const ap = (2 * Math.PI) / z;
        const hta = (Math.PI + 4 * x * Math.tan(aRad)) / (2 * z);
        const invA = inv(aRad);
        const verts = [];
        for (let t = 0; t < z; t++) {
          const tc = t * ap;
          const rB = tc - hta - invA,
            lB = tc + hta + invA;
          if (rf < rb) verts.push(polar(rf, rB, cx, cy));
          for (let i = 0; i <= steps; i++) {
            const r = rb + (ra - rb) * (i / steps);
            verts.push(polar(r, rB + invAt(rb, r), cx, cy));
          }
          const tipR = rB + invAt(rb, ra),
            tipL = lB - invAt(rb, ra);
          let ts = tipL - tipR;
          while (ts < 0) ts += 2 * Math.PI;
          if (ts > 0.001 && ts < ap)
            verts.push(polar(ra, tipR + ts / 2, cx, cy));
          for (let i = steps; i >= 0; i--) {
            const r = rb + (ra - rb) * (i / steps);
            verts.push(polar(r, lB - invAt(rb, r), cx, cy));
          }
          if (rf < rb) verts.push(polar(rf, lB, cx, cy));
          const nrB = (t + 1) * ap - hta - invA;
          const rootMid = rf < rb ? (lB + nrB) / 2 : lB + (nrB - lB) / 2;
          verts.push(polar(rf, rootMid, cx, cy));
        }
        return verts;
      }

      // === INTERNAL GEAR ===
      function genInternal(m, z, alpha, x, steps, cx, cy) {
        const aRad = (alpha * Math.PI) / 180;
        const rp = (m * z) / 2,
          rb = rp * Math.cos(aRad);
        const ra = rp - m * (1 + x),
          rf = rp + m * (1.25 - x);
        const ap = (2 * Math.PI) / z;
        const hta = (Math.PI + 4 * x * Math.tan(aRad)) / (2 * z);
        const invA = inv(aRad);
        const verts = [];
        for (let s = 0; s < z; s++) {
          const tc = s * ap;
          const rB = tc - hta - invA,
            lB = tc + hta + invA;
          // Right flank rf→ra
          for (let i = 0; i <= steps; i++) {
            const r = rf - (rf - ra) * (i / steps);
            verts.push(polar(r, rB + invAt(rb, r), cx, cy));
          }
          // Bottom
          verts.push(polar(ra, tc, cx, cy));
          // Left flank ra→rf
          for (let i = 0; i <= steps; i++) {
            const r = ra + (rf - ra) * (i / steps);
            verts.push(polar(r, lB - invAt(rb, r), cx, cy));
          }
          // Body mid
          verts.push(polar(rf, tc + ap / 2, cx, cy));
        }
        return verts;
      }

      // === SPROCKET ===
      function genSprocket(p, z, d1, steps, cx, cy) {
        const dp = p / Math.sin(Math.PI / z),
          rp = dp / 2;
        const da = dp + 1.25 * p - d1,
          ra = da / 2;
        const rSeat = (d1 / 2) * 1.005;
        const seatDeg = Math.min(130, 140 - 90 / z);
        const seatHalf = ((seatDeg / 2) * Math.PI) / 180;
        const ap = (2 * Math.PI) / z;
        const verts = [];
        for (let t = 0; t < z; t++) {
          const tc = t * ap;
          const rcx = rp * Math.cos(tc),
            rcy = rp * Math.sin(tc);
          const sA = tc + Math.PI - seatHalf,
            eA = tc + Math.PI + seatHalf;
          for (let i = 0; i <= steps; i++) {
            const a = sA + (eA - sA) * (i / steps);
            verts.push({
              x: cx + rcx + rSeat * Math.cos(a),
              y: cy + rcy + rSeat * Math.sin(a),
            });
          }
          verts.push(polar(ra, tc + ap / 2, cx, cy));
        }
        return verts;
      }

      function polar(r, a, cx, cy) {
        return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
      }

      // Draw all 4 types
      drawProfile(
        "ext",
        "External m=2 z=20",
        genExternal(2, 20, 20, 0, 10, 0, 0),
        0,
        0,
        7,
      );
      drawProfile(
        "int",
        "Internal m=3 z=20 (current)",
        genInternal(3, 20, 20, 0, 10, 0, 0),
        0,
        0,
        5,
      );
      drawProfile(
        "int2",
        "Internal m=5 z=12",
        genInternal(5, 12, 20, 0, 10, 0, 0),
        0,
        0,
        4,
      );
      drawProfile(
        "spr",
        "Sprocket p=12.7 z=19",
        genSprocket(12.7, 19, 8.51, 8, 0, 0),
        0,
        0,
        3,
      );
    </script>
  </body>
</html>
