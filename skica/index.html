<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>SKICA – CAD pro CNC soustružník v3</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- ── Mobile Controls ── -->
    <button id="mobileToolbarToggle" aria-label="Nástroje">🔧</button>
    <button id="mobileNumInput" aria-label="Zadat">🔢</button>
    <button id="mobileMeasure" aria-label="Měření">📏</button>
    <button id="mobileSidebarToggle" aria-label="Panel">☰</button>
    <button id="mobileAutoCenter" aria-label="Vycentrovat">⊙</button>
    <div id="mobileCoordBar">X: 0.000 &nbsp; Z: 0.000</div>
    <div id="sidebarOverlay"></div>

    <!-- ── Precision Crosshair (long-press) ── -->
    <div id="precisionCrosshair">
      <div class="ch-h"></div>
      <div class="ch-v"></div>
      <div class="ch-dot"></div>
      <div class="ch-connector"></div>
      <div class="ch-label"></div>
    </div>

    <!-- ── Toolbar ── -->
    <div id="topbar">
      <button class="tool-btn" id="btnUndo" title="Zpět (Ctrl+Z)" disabled>
        ↩ Zpět
      </button>
      <button class="tool-btn" id="btnRedo" title="Vpřed (Ctrl+Y)" disabled>
        ↪ Vpřed
      </button>
      <div class="sep"></div>
      <button class="tool-btn active" data-tool="select" title="Výběr (V)">
        <svg viewBox="0 0 24 24">
          <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51z" />
        </svg>
        Výběr
      </button>
      <button class="tool-btn" data-tool="move" title="Přesun (W)">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2l3 3h-2v5h5v-2l3 3-3 3v-2h-5v5h2l-3 3-3-3h2v-5H5v2L2 12l3-3v2h5V6H8z"
            fill="currentColor"
          />
        </svg>
        Přesun
      </button>
      <button class="tool-btn" data-tool="point" title="Bod (P)">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4" /></svg> Bod
      </button>
      <button class="tool-btn" data-tool="line" title="Úsečka (L)">
        <svg viewBox="0 0 24 24">
          <line
            x1="4"
            y1="20"
            x2="20"
            y2="4"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Úsečka
      </button>
      <button class="tool-btn" data-tool="constr" title="Konstrukční čára (K)">
        <svg viewBox="0 0 24 24">
          <line
            x1="2"
            y1="22"
            x2="22"
            y2="2"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-dasharray="4 3"
          />
        </svg>
        Konstr.
      </button>
      <button class="tool-btn" data-tool="circle" title="Kružnice (C)">
        <svg viewBox="0 0 24 24">
          <circle
            cx="12"
            cy="12"
            r="9"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Kružnice
      </button>
      <button class="tool-btn" data-tool="arc" title="Oblouk (A)">
        <svg viewBox="0 0 24 24">
          <path
            d="M4 20 A 12 12 0 0 1 20 4"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Oblouk
      </button>
      <button class="tool-btn" data-tool="rect" title="Obdélník (R)">
        <svg viewBox="0 0 24 24">
          <rect
            x="3"
            y="5"
            width="18"
            height="14"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>
        Obdélník
      </button>
      <div class="sep"></div>
      <button
        class="tool-btn mobile-hide"
        data-tool="measure"
        title="Měření (M)"
      >
        <svg viewBox="0 0 24 24">
          <path
            d="M3 21L21 3M8 21V16M13 21V13M18 21V10"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
          />
        </svg>
        Měření
      </button>
      <div class="sep"></div>
      <button class="tool-btn" id="btnSnap" title="Přichytávání k mřížce (G)">
        <span class="snap-ind snap-on"></span>Snap
      </button>
      <button class="tool-btn" id="btnDims" title="Zobrazit kóty (D)">
        📐 Kóty
      </button>
      <button
        class="tool-btn mobile-hide"
        id="btnNumInput"
        title="Číselný vstup (N)"
      >
        🔢 Zadat
      </button>
      <button
        class="tool-btn"
        id="btnPolar"
        title="Polární kreslení z bodu (Shift+N)"
      >
        📐 Polární
      </button>
      <button class="tool-btn" id="btnCalcInt" title="Vypočítat průsečíky">
        ⊗ Průsečíky
      </button>
      <div class="sep"></div>
      <button class="tool-btn" id="btnSave" title="Uložit projekt (Ctrl+S)">
        💾 Uložit
      </button>
      <button class="tool-btn" id="btnLoad" title="Načíst projekt">
        📂 Načíst
      </button>
      <button class="tool-btn" id="btnClearAll" title="Smazat vše">
        🗑 Smazat
      </button>
      <button class="tool-btn" id="btnExport" title="Export CNC souřadnic">
        📋 CNC Export
      </button>
      <button class="tool-btn" id="btnGitHub" title="GitHub auto-save">
        ☁️ GitHub<span id="ghStatusDot" class="gh-status"></span>
      </button>
      <div id="coordDisplay">X: 0.000 &nbsp; Z: 0.000</div>
    </div>

    <!-- ── Main ── -->
    <div id="main">
      <div id="canvasWrap">
        <canvas id="gridCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
      </div>
      <div id="sidebar">
        <button id="sidebarEditBtn" class="sidebar-edit-btn">
          ✏️ Upravit objekt
        </button>
        <div class="panel-header" onclick="togglePanel('objPanel')">
          ▾ Objekty
        </div>
        <div class="panel-body" id="objPanel">
          <ul id="objectList"></ul>
        </div>
        <div class="panel-header" onclick="togglePanel('propPanel')">
          ▾ Vlastnosti
        </div>
        <div class="panel-body" id="propPanel">
          <table id="propTable">
            <tbody></tbody>
          </table>
        </div>
        <div class="panel-header" onclick="togglePanel('intPanel')">
          ▾ Průsečíky
        </div>
        <div class="panel-body" id="intPanel">
          <ul id="intersectionList">
            <li style="color: #6c7086">Klikněte ⊗ Průsečíky</li>
          </ul>
        </div>
        <div class="panel-header" onclick="togglePanel('cncPanel')">
          ▾ CNC Souřadnice
        </div>
        <div class="panel-body" id="cncPanel">
          <pre id="cncOutput">Klikněte 📋 CNC Export</pre>
        </div>
      </div>
    </div>

    <!-- ── Statusbar ── -->
    <div id="statusbar">
      <span id="statusTool">Nástroj: Výběr</span>
      <span id="statusHint">Klikněte pro výběr objektu</span>
      <span id="statusZoom">Zoom: 100%</span>
      <span
        id="statusGrid"
        title="Klikněte pro změnu velikosti mřížky"
        style="cursor: pointer"
        >Mřížka: 10</span
      >
      <span>Posun: Prostřední tlačítko / Shift+táhnutí</span>
    </div>

    <!-- ── Skripty (pořadí načtení je důležité!) ── -->
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/geometry.js"></script>
    <script src="js/render.js"></script>
    <script src="js/objects.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/events.js"></script>
    <script src="js/touch.js"></script>
    <script src="js/dialogs.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
