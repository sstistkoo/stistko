<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible - Český studijní překlad</title>
    <link rel="stylesheet" href="styl.css">
    <style>
        .bible-layout {
            display: flex;
            height: 100vh;
        }
        .bible-sidebar {
            width: 320px;
            background: var(--parch);
            border-right: 1px solid var(--violet4);
            padding: 1rem;
            overflow-y: auto;
        }
        .bible-sidebar h2 {
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            color: var(--violet);
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
        }
        .bible-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            background: var(--parch);
        }
        #book-select {
            width: 100%;
            padding: 0.5rem;
            font-size: 0.95rem;
            border: 1px solid var(--violet4);
            border-radius: 4px;
            background: white;
            margin-bottom: 1.5rem;
        }
        .verse {
            margin-bottom: 1.4rem;
            line-height: 1.6;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1.08rem;
            color: #222;
            text-align: justify;
            hyphens: auto;
        }
        .verse-num {
            color: #4a3a8a;
            font-size: 0.75rem;
            margin-right: 0.4rem;
            font-weight: 600;
            vertical-align: super;
        }
        .detail-trigger {
            color: #1a3a7a;
            cursor: pointer;
            border-bottom: 1px dotted #1a3a7a;
            padding-bottom: 1px;
            transition: background 0.2s, color 0.2s;
        }
        .detail-trigger:hover {
            background: #e8ecf4;
            border-bottom-style: solid;
        }
        .detail-trigger:focus {
            outline: none;
            background: #d0d8ec;
        }
        .commentary-box {
            background: white;
            border: 1px solid var(--violet4);
            border-radius: 6px;
            padding: 1rem;
        }
        .commentary-ref {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            color: var(--violet);
            margin-bottom: 0.5rem;
        }
        .commentary-content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
        }
        .commentary-empty {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="bible-layout">
        <aside class="bible-sidebar">
            <h2>Rozbor</h2>
            <div id="commentary-panel">
                <p style="color:#888;font-style:italic;">Vyberte verš s ⌈...⌉ značkou pro zobrazení rozboru.</p>
            </div>
        </aside>
        <main class="bible-main">
            <select id="book-select">
                <option value="">-- Vyberte knihu --</option>
            </select>
            <div id="verse-display">
                <p style="color:#888;">Vyberte knihu pro zobrazení textu.</p>
            </div>
        </main>
    </div>
    <script src="bible.js"></script>
</body>
</html>
